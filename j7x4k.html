<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;500&family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg0: #0e0c0a;
    --bg1: #141210;
    --bg2: #1a1714;
    --bg3: #221f1b;
    --bg4: #2a2620;
    --amber: #c8922a;
    --amber-light: #e8b04a;
    --amber-dim: rgba(200,146,42,0.15);
    --amber-border: rgba(200,146,42,0.2);
    --text0: #f0ece4;
    --text1: #b8b0a0;
    --text2: #6a6258;
    --text3: #3a3530;
    --green: #7ab87a;
    --red: #c05050;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.03);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg0); color: var(--text0); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  body::before { content: ''; position: fixed; inset: 0; opacity: 0.025; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); background-size: 200px; pointer-events: none; z-index: 0; }
  .header { position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 60px; border-bottom: 1px solid var(--border); background: var(--bg1); flex-shrink: 0; }
  .wordmark { display: flex; align-items: baseline; gap: 10px; }
  .wordmark-j { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 400; color: var(--amber-light); letter-spacing: 0.05em; }
  .wordmark-sub { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 300; color: var(--text2); letter-spacing: 0.25em; text-transform: uppercase; }
  .header-center { display: flex; gap: 32px; }
  .hstat { text-align: center; }
  .hstat-val { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 400; color: var(--text0); line-height: 1; }
  .hstat-val.amber { color: var(--amber-light); }
  .hstat-val.warn { color: var(--amber); }
  .hstat-label { font-size: 10px; color: var(--text2); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 3px; font-weight: 300; }
  .header-right { display: flex; align-items: center; gap: 20px; }
  .biz-tabs { display: flex; gap: 4px; background: var(--bg2); padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
  .biz-tab { padding: 5px 14px; border-radius: 5px; font-size: 12px; font-weight: 400; cursor: pointer; border: none; background: transparent; color: var(--text2); transition: all 0.15s; letter-spacing: 0.02em; }
  .biz-tab.active { background: var(--bg4); color: var(--text0); }
  .biz-tab.add { color: var(--text2); font-size: 16px; padding: 5px 10px; }
  .biz-tab.add:hover { color: var(--amber); }
  .online-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: glow 3s ease-in-out infinite; }
  @keyframes glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .main { display: flex; flex: 1; overflow: hidden; position: relative; z-index: 5; }
  .left-panel { width: 260px; flex-shrink: 0; border-right: 1px solid var(--border); background: var(--bg1); display: flex; flex-direction: column; overflow: hidden; }
  .panel-section { padding: 20px 20px 16px; border-bottom: 1px solid var(--border2); }
  .panel-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text2); margin-bottom: 14px; }
  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .metric-card { background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; padding: 12px; }
  .metric-card-val { font-family: 'DM Mono', monospace; font-size: 18px; color: var(--text0); line-height: 1; margin-bottom: 4px; }
  .metric-card-val.amber { color: var(--amber-light); }
  .metric-card-val.warn { color: var(--amber); }
  .metric-card-val.red { color: var(--red); }
  .metric-card-label { font-size: 10px; color: var(--text2); font-weight: 300; }
  .expiring-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border2); }
  .expiring-item:last-child { border-bottom: none; }
  .exp-name { font-size: 12px; color: var(--text1); font-family: 'DM Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
  .exp-badge { font-size: 10px; font-family: 'DM Mono', monospace; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }
  .exp-urgent { background: rgba(192,80,80,0.15); color: var(--red); }
  .exp-warn { background: rgba(200,146,42,0.15); color: var(--amber); }
  .exp-ok { background: rgba(122,184,122,0.1); color: var(--green); }
  .commands { flex: 1; overflow-y: auto; padding: 16px; }
  .commands::-webkit-scrollbar { width: 3px; }
  .commands::-webkit-scrollbar-thumb { background: var(--border); }
  .cmd-btn { width: 100%; background: transparent; border: 1px solid transparent; color: var(--text1); padding: 9px 12px; margin-bottom: 4px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 300; cursor: pointer; text-align: left; transition: all 0.15s; display: flex; align-items: center; gap: 10px; letter-spacing: 0.01em; }
  .cmd-btn:hover { background: var(--bg3); border-color: var(--border); color: var(--text0); }
  .cmd-icon { width: 20px; height: 20px; border-radius: 4px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
  .chat { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg0); }
  .messages { flex: 1; overflow-y: auto; padding: 32px 40px; display: flex; flex-direction: column; gap: 24px; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }
  .msg { display: flex; gap: 14px; animation: appear 0.25s ease; max-width: 800px; }
  @keyframes appear { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; }
  .avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; margin-top: 2px; }
  .jarvis-av { background: var(--amber-dim); border: 1px solid var(--amber-border); color: var(--amber-light); font-family: 'Playfair Display', serif; font-size: 14px; }
  .user-av { background: var(--bg3); border: 1px solid var(--border); color: var(--text1); font-family: 'DM Mono', monospace; font-size: 11px; }
  .msg-wrap { display: flex; flex-direction: column; gap: 4px; max-width: 640px; }
  .msg.user .msg-wrap { align-items: flex-end; }
  .msg-name { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text2); letter-spacing: 0.1em; text-transform: uppercase; padding: 0 4px; }
  .bubble { padding: 14px 18px; border-radius: 10px; font-size: 14px; line-height: 1.7; font-weight: 300; }
  .jarvis-bubble { background: var(--bg2); border: 1px solid var(--border); color: var(--text0); border-top-left-radius: 3px; }
  .user-bubble { background: var(--bg3); border: 1px solid var(--border); color: var(--text1); border-top-right-radius: 3px; }
  .bubble b, .bubble strong { color: var(--text0); font-weight: 500; }
  .bubble .mono { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--amber-light); background: var(--bg3); padding: 1px 6px; border-radius: 3px; }
  .bubble .section-head { font-size: 12px; font-family: 'DM Mono', monospace; letter-spacing: 0.15em; text-transform: uppercase; color: var(--amber); margin: 12px 0 6px; display: block; }
  .bubble ul { list-style: none; padding: 0; }
  .bubble ul li { padding: 3px 0 3px 14px; position: relative; color: var(--text1); }
  .bubble ul li::before { content: '—'; position: absolute; left: 0; color: var(--text3); font-size: 12px; }
  .typing-dots { display: flex; gap: 5px; padding: 4px 0; align-items: center; }
  .typing-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--amber); opacity: 0.4; animation: bounce 1.2s ease-in-out infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 100% { opacity: 0.4; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-3px); } }
  .progress { height: 1px; background: linear-gradient(90deg, transparent 0%, var(--amber) 50%, transparent 100%); background-size: 300% 100%; animation: prog 1.5s linear infinite; display: none; flex-shrink: 0; }
  .progress.on { display: block; }
  @keyframes prog { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
  .input-zone { padding: 16px 40px 24px; border-top: 1px solid var(--border); background: var(--bg1); flex-shrink: 0; }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  #chatInput { flex: 1; background: var(--bg2); border: 1px solid var(--border); color: var(--text0); padding: 12px 18px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300; outline: none; resize: none; min-height: 46px; max-height: 140px; transition: border-color 0.15s; line-height: 1.5; }
  #chatInput:focus { border-color: var(--amber-border); background: var(--bg3); }
  #chatInput::placeholder { color: var(--text3); }
  .icon-btn { width: 46px; height: 46px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.15s; flex-shrink: 0; }
  .icon-btn:hover { border-color: var(--amber-border); color: var(--amber-light); }
  .icon-btn.primary { background: var(--amber-dim); border-color: var(--amber-border); color: var(--amber-light); }
  .icon-btn.primary:hover { background: rgba(200,146,42,0.25); }
  .icon-btn.recording { background: rgba(192,80,80,0.15); border-color: rgba(192,80,80,0.4); color: var(--red); animation: recPulse 1s ease-in-out infinite; }
  @keyframes recPulse { 0%, 100% { box-shadow: 0 0 0 rgba(192,80,80,0.3); } 50% { box-shadow: 0 0 12px rgba(192,80,80,0.3); } }
  .input-meta { display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: var(--text3); font-weight: 300; letter-spacing: 0.02em; }
</style>
</head>
<body>
<header class="header">
  <div class="wordmark">
    <span class="wordmark-j">Jarvis</span>
    <span class="wordmark-sub">Personal OS</span>
  </div>
  <div class="header-center">
    <div class="hstat"><div class="hstat-val amber" id="hMRR">—</div><div class="hstat-label">MRR</div></div>
    <div class="hstat"><div class="hstat-val" id="hMembers">—</div><div class="hstat-label">Members</div></div>
    <div class="hstat"><div class="hstat-val warn" id="hTrials">—</div><div class="hstat-label">Trials</div></div>
    <div class="hstat"><div class="hstat-val" id="hExpiring" style="color:var(--red)">—</div><div class="hstat-label">Expiring</div></div>
  </div>
  <div class="header-right">
    <div class="biz-tabs">
      <button class="biz-tab active">GradeIQ</button>
      <button class="biz-tab add" title="Add business">+</button>
    </div>
    <div class="online-dot"></div>
  </div>
</header>

<div class="progress" id="progress"></div>

<div class="main">
  <aside class="left-panel">
    <div class="panel-section">
      <div class="panel-label">Overview</div>
      <div class="metric-grid">
        <div class="metric-card"><div class="metric-card-val amber" id="sMRR">—</div><div class="metric-card-label">MRR</div></div>
        <div class="metric-card"><div class="metric-card-val" id="sMembers">—</div><div class="metric-card-label">Paying</div></div>
        <div class="metric-card"><div class="metric-card-val warn" id="sTrials">—</div><div class="metric-card-label">Trials</div></div>
        <div class="metric-card"><div class="metric-card-val red" id="sExpiring">—</div><div class="metric-card-label">Expiring</div></div>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Expiring this week</div>
      <div id="expiringList"><div style="font-size:11px;color:var(--text3);font-weight:300">Loading...</div></div>
    </div>
    <div class="commands">
      <div class="panel-label" style="margin-bottom:10px">Commands</div>
      <button class="cmd-btn" onclick="quick('Give me a complete morning briefing for GradeIQ — MRR, trials, what needs attention today.')"><div class="cmd-icon">🌅</div> Morning briefing</button>
      <button class="cmd-btn" onclick="quick('Who has a trial expiring in the next 7 days? List their emails and days remaining.')"><div class="cmd-icon">⚠️</div> Expiring trials</button>
      <button class="cmd-btn" onclick="quick('Draft a short, personal outreach message for each trial member expiring this week. Sound like Jordan.')"><div class="cmd-icon">✉️</div> Draft outreach</button>
      <button class="cmd-btn" onclick="quick('What are the 3 highest leverage things I should do this week to grow GradeIQ?')"><div class="cmd-icon">🎯</div> Weekly priorities</button>
      <button class="cmd-btn" onclick="quick('Write me a TikTok script idea based on what would resonate most with sports card investors right now.')"><div class="cmd-icon">🎬</div> TikTok script</button>
      <button class="cmd-btn" onclick="quick('How many active members have connected Discord vs not? What should I do about the ones who have not?')"><div class="cmd-icon">💬</div> Discord gap</button>
      <button class="cmd-btn" onclick="quick('What is my estimated trial-to-paid conversion rate and what is a realistic path to $1,000 MRR?')"><div class="cmd-icon">📈</div> Growth math</button>
      <button class="cmd-btn" onclick="quick('Roast my business. What are the 3 biggest risks or weaknesses in GradeIQ right now?')"><div class="cmd-icon">🔥</div> Devil's advocate</button>
    </div>
  </aside>

  <div class="chat">
    <div class="messages" id="messages"></div>
    <div class="input-zone">
      <div class="input-row">
        <button class="icon-btn" id="voiceBtn" onclick="toggleVoice()" title="Voice input">🎤</button>
        <textarea id="chatInput" placeholder="Ask Jarvis anything..." rows="1" onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
        <button class="icon-btn primary" onclick="send()" title="Send">↑</button>
      </div>
      <div class="input-meta">
        <span>Enter to send · Shift+Enter for new line</span>
        <span>private · session only</span>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://lmwqizcflhikvtoqehzj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxtd3FpemNmbGhpa3Z0b3FlaHpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDQ5NDMsImV4cCI6MjA4OTk4MDk0M30.95XMeRWGeCcD_KxN40ciJi_QjB9GG4sVJexzBEhJ9NM';
const MRR_PER = 19.99;

let data = null;
let history = [];
let typingEl = null;
let isRecording = false;
let recognition = null;

async function db(table, params='') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  return r.json();
}

async function loadData() {
  try {
    const members = await db('whop_members', 'select=*');
    const now = new Date();
    const active = members.filter(m => m.status === 'active');
    const paying = active.filter(m => (now - new Date(m.joined_at)) / 86400000 > 30);
    const trials = active.filter(m => (now - new Date(m.joined_at)) / 86400000 <= 30);
    const expiring = trials.map(m => {
      const d = Math.floor((now - new Date(m.joined_at)) / 86400000);
      return { ...m, daysSince: d, daysLeft: 30 - d };
    }).filter(m => m.daysLeft <= 7 && m.daysLeft >= 0).sort((a,b) => a.daysLeft - b.daysLeft);

    data = {
      mrr: (paying.length * MRR_PER).toFixed(2),
      paying: paying.length,
      trials: trials.length,
      inactive: members.filter(m => m.status === 'inactive').length,
      total: members.length,
      expiring,
      discordOn: active.filter(m => m.discord_id).length,
      discordOff: active.filter(m => !m.discord_id).length,
      active: active.length,
    };
    renderSidebar();
  } catch(e) { console.error(e); }
}

function renderSidebar() {
  if (!data) return;
  const { mrr, paying, trials, expiring } = data;
  document.getElementById('hMRR').textContent = `$${mrr}`;
  document.getElementById('hMembers').textContent = paying;
  document.getElementById('hTrials').textContent = trials;
  document.getElementById('hExpiring').textContent = expiring.length;
  document.getElementById('sMRR').textContent = `$${mrr}`;
  document.getElementById('sMembers').textContent = paying;
  document.getElementById('sTrials').textContent = trials;
  document.getElementById('sExpiring').textContent = expiring.length;
  const list = document.getElementById('expiringList');
  if (expiring.length === 0) {
    list.innerHTML = `<div style="font-size:11px;color:var(--text3);font-weight:300">None this week</div>`;
  } else {
    list.innerHTML = expiring.slice(0, 6).map(m => {
      const name = (m.email||'').split('@')[0];
      const cls = m.daysLeft <= 2 ? 'exp-urgent' : m.daysLeft <= 4 ? 'exp-warn' : 'exp-ok';
      return `<div class="expiring-item"><span class="exp-name">${name}</span><span class="exp-badge ${cls}">${m.daysLeft}d</span></div>`;
    }).join('');
  }
}

function systemPrompt() {
  if (!data) return "You are Jarvis, Jordan's personal AI business assistant.";
  const exp = data.expiring.map(m => `${m.email} — ${m.daysLeft} days left`).join('\n') || 'None';
  return `You are Jarvis — Jordan's personal AI business operating system.

Jordan is the founder of GradeIQ (gradeiq.co), a sports card investment platform that surfaces raw-to-grade opportunities using expected value math across PSA submission tiers. He built it with no coding background using Claude as a partner. He's entrepreneurial, gets bored fast, and wants GradeIQ to run on 30 minutes/day while he launches more businesses.

LIVE GRADEIQ DATA:
- MRR: $${data.mrr}
- Paying members: ${data.paying}
- Active trials: ${data.trials}
- Inactive/churned: ${data.inactive}
- Total ever: ${data.total}
- Discord connected: ${data.discordOn} / ${data.active} active members
- Trials expiring this week: ${data.expiring.length}

EXPIRING TRIALS:
${exp}

CONTEXT:
- Price: $19.99/month, 30-day free trial
- Stack: Cloudflare Workers, Supabase, Whop, Resend, n8n
- Distribution: TikTok (primary), Discord community, podcast
- Goal: $10k MRR, mostly automated, then launch business #2
- Already built: 5-email trial automation sequence in n8n

JORDAN'S VOICE (when drafting messages):
Casual, direct, genuine. Short sentences. No corporate speak. Signs off "— Jordan, GradeIQ"

You manage GradeIQ now and will manage future businesses too. Be concise, direct, and actionable. Use the live data above. Format with bold headers when helpful. Never pad responses.`;
}

async function send() {
  const el = document.getElementById('chatInput');
  const text = el.value.trim();
  if (!text) return;
  el.value = '';
  autoGrow(el);
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  showTyping();
  setProgress(true);
  try {
    const res = await fetch('/api/jarvis', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt(),
        messages: history,
      })
    });
    const d = await res.json();
    const reply = d.content?.[0]?.text || 'Error — no response received.';
    hideTyping();
    addMsg('jarvis', reply);
    history.push({ role: 'assistant', content: reply });
  } catch(e) {
    hideTyping();
    addMsg('jarvis', `Connection error: ${e.message}`);
  }
  setProgress(false);
}

function quick(text) {
  document.getElementById('chatInput').value = text;
  send();
}

function addMsg(role, text) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const av = role === 'jarvis' ? `<div class="avatar jarvis-av">J</div>` : `<div class="avatar user-av">You</div>`;
  div.innerHTML = `${av}<div class="msg-wrap"><div class="msg-name">${role === 'jarvis' ? 'Jarvis' : 'Jordan'}</div><div class="bubble ${role}-bubble">${fmt(text)}</div></div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function fmt(t) {
  return t
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.+)$/gm, '<span class="section-head">$1</span>')
    .replace(/^## (.+)$/gm, '<span class="section-head">$1</span>')
    .replace(/`([^`]+)`/g, '<span class="mono">$1</span>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  const wrap = document.getElementById('messages');
  typingEl = document.createElement('div');
  typingEl.className = 'msg jarvis';
  typingEl.innerHTML = `<div class="avatar jarvis-av">J</div><div class="msg-wrap"><div class="msg-name">Jarvis</div><div class="bubble jarvis-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
  wrap.appendChild(typingEl);
  wrap.scrollTop = wrap.scrollHeight;
}

function hideTyping() { typingEl?.remove(); typingEl = null; }
function setProgress(on) { document.getElementById('progress').classList.toggle('on', on); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function autoGrow(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 140) + 'px'; }

function toggleVoice() {
  const btn = document.getElementById('voiceBtn');
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    addMsg('jarvis', 'Voice input requires Chrome.');
    return;
  }
  if (isRecording) { recognition?.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.onstart = () => { isRecording = true; btn.classList.add('recording'); btn.textContent = '⏹'; };
  recognition.onresult = e => { document.getElementById('chatInput').value = e.results[0][0].transcript; send(); };
  recognition.onend = () => { isRecording = false; btn.classList.remove('recording'); btn.textContent = '🎤'; };
  recognition.start();
}

async function boot() {
  const h = new Date().getHours();
  const tod = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
  addMsg('jarvis', `Good ${tod}, Jordan. Loading your data...`);
  setProgress(true);
  await loadData();
  setProgress(false);
  if (data) {
    const urgent = data.expiring.filter(m => m.daysLeft <= 3).length;
    let msg = `**GradeIQ is at $${data.mrr} MRR** — ${data.paying} paying members, ${data.trials} active trials.`;
    if (data.expiring.length > 0) {
      msg += `\n\n**${data.expiring.length} trial${data.expiring.length > 1 ? 's' : ''} expiring this week.**`;
      if (urgent > 0) msg += ` ${urgent} need attention in the next 3 days.`;
    }
    msg += `\n\nWhat do you need?`;
    addMsg('jarvis', msg);
    history.push({ role: 'assistant', content: msg });
  }
}

boot();
</script>
