<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0a;
--bg1:#111111;
--bg2:#1a1a1a;
--bg3:#222222;
--bg4:#2a2a2a;
--border:#2a2a2a;
--border2:#333333;
--text:#ededed;
--text2:#a1a1a1;
--text3:#555555;
--accent:#ffffff;
--green:#00c853;
--green-dim:rgba(0,200,83,0.1);
--red:#ff4444;
--red-dim:rgba(255,68,68,0.1);
--amber:#f5a623;
--amber-dim:rgba(245,166,35,0.1);
--blue:#0070f3;
--blue-dim:rgba(0,112,243,0.1);
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Geist',system-ui,sans-serif;display:flex;flex-direction:column;font-size:13px;line-height:1.5}

/* ─ Header ─ */
.hdr{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:32px;flex-shrink:0;background:var(--bg)}
.hdr-brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-logo{width:26px;height:26px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center}
.hdr-logo svg{width:14px;height:14px}
.hdr-name{font-size:14px;font-weight:600;letter-spacing:-0.01em;color:var(--accent)}
.hdr-sep{width:1px;height:20px;background:var(--border2);flex-shrink:0}
.hdr-stats{display:flex;gap:0;flex:1}
.hstat{display:flex;align-items:center;gap:8px;padding:0 20px;border-right:1px solid var(--border);height:56px}
.hstat:first-child{padding-left:0}
.hstat-val{font-family:'Geist Mono',monospace;font-size:15px;font-weight:500;color:var(--accent);letter-spacing:-0.02em}
.hstat-val.green{color:var(--green)}
.hstat-val.amber{color:var(--amber)}
.hstat-val.red{color:var(--red)}
.hstat-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-weight:400}
.hdr-right{display:flex;align-items:center;gap:12px;flex-shrink:0;margin-left:auto}
.biz-switcher{display:flex;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:3px;gap:2px}
.biz-btn{padding:4px 12px;border-radius:5px;font-size:12px;font-weight:500;border:none;background:transparent;color:var(--text2);cursor:pointer;transition:all 0.12s;font-family:inherit;letter-spacing:-0.01em}
.biz-btn.active{background:var(--bg4);color:var(--accent)}
.biz-btn.add{color:var(--text3);font-size:15px;padding:4px 10px}
.biz-btn.add:hover{color:var(--accent)}
.status-pill{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);letter-spacing:0.04em}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 2px var(--green-dim);animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 2px var(--green-dim)}50%{box-shadow:0 0 0 4px var(--green-dim)}}

/* ─ Body ─ */
.body{display:flex;flex:1;overflow:hidden}

/* ─ Sidebar ─ */
.sidebar{width:240px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg1);display:flex;flex-direction:column;overflow:hidden}
.sb-section{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.sb-label{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.metric-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0}
.metric-key{font-size:12px;color:var(--text2)}
.metric-num{font-family:'Geist Mono',monospace;font-size:13px;font-weight:500;color:var(--accent)}
.metric-num.green{color:var(--green)}
.metric-num.amber{color:var(--amber)}
.metric-num.red{color:var(--red)}

/* Expiring list */
.exp-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.exp-row:last-child{border:none}
.exp-email{font-size:12px;color:var(--text);font-family:'Geist Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:148px}
.tag{font-size:10px;font-family:'Geist Mono',monospace;font-weight:500;padding:2px 7px;border-radius:4px;flex-shrink:0;letter-spacing:0.02em}
.tag-red{background:var(--red-dim);color:var(--red)}
.tag-amber{background:var(--amber-dim);color:var(--amber)}
.tag-green{background:var(--green-dim);color:var(--green)}

/* Commands */
.cmds{flex:1;overflow-y:auto;padding:12px 8px}
.cmds::-webkit-scrollbar{width:3px}
.cmds::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.cmd{width:100%;background:transparent;border:none;color:var(--text2);padding:8px 10px;border-radius:6px;font-family:inherit;font-size:12px;cursor:pointer;text-align:left;transition:all 0.1s;display:flex;align-items:center;gap:9px;margin-bottom:1px}
.cmd:hover{background:var(--bg2);color:var(--text)}
.cmd-dot{width:5px;height:5px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:background 0.1s}
.cmd:hover .cmd-dot{background:var(--accent)}

/* ─ Chat ─ */
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.msgs{flex:1;overflow-y:auto;padding:28px 32px;display:flex;flex-direction:column;gap:20px}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}

.msg{display:flex;gap:12px;max-width:760px;animation:fadein 0.2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;align-self:flex-end}

.av{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:1px;font-family:'Geist Mono',monospace;letter-spacing:-0.02em}
.av-j{background:var(--accent);color:var(--bg)}
.av-u{background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}

.msg-inner{display:flex;flex-direction:column;gap:3px;max-width:600px}
.msg.user .msg-inner{align-items:flex-end}
.msg-who{font-size:10px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;font-weight:500;padding:0 2px}

.bubble{padding:12px 16px;border-radius:10px;font-size:13px;line-height:1.65;font-weight:300}
.bubble-j{background:var(--bg1);border:1px solid var(--border2);color:var(--text);border-top-left-radius:2px}
.bubble-u{background:var(--bg2);border:1px solid var(--border);color:var(--text2);border-top-right-radius:2px}
.bubble strong{color:var(--accent);font-weight:500}
.bubble code{font-family:'Geist Mono',monospace;font-size:12px;background:var(--bg3);color:var(--amber);padding:1px 5px;border-radius:3px}
.bubble .sh{font-size:11px;font-family:'Geist Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;color:var(--blue);display:block;margin:10px 0 5px}
.bubble ul{list-style:none;padding:0}
.bubble li{padding:2px 0 2px 12px;position:relative;color:var(--text2)}
.bubble li::before{content:'–';position:absolute;left:0;color:var(--text3)}

/* Typing */
.typing{display:flex;gap:4px;padding:4px 0;align-items:center}
.typing span{width:4px;height:4px;border-radius:50%;background:var(--text3);animation:tb 1.1s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.18s}
.typing span:nth-child(3){animation-delay:.36s}
@keyframes tb{0%,100%{background:var(--text3);transform:scale(1)}50%{background:var(--text2);transform:scale(1.3)}}

/* Progress bar */
.pbar{height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);background-size:200% 100%;animation:pb 1.2s linear infinite;display:none;flex-shrink:0}
.pbar.on{display:block}
@keyframes pb{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ─ Input ─ */
.input-wrap{padding:14px 32px 20px;border-top:1px solid var(--border);background:var(--bg1);flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end}
#inp{flex:1;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:10px 14px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:300;outline:none;resize:none;min-height:42px;max-height:120px;transition:border-color 0.12s;line-height:1.5}
#inp:focus{border-color:var(--border2);background:var(--bg3)}
#inp::placeholder{color:var(--text3)}
.ibtn{width:42px;height:42px;border-radius:8px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.12s;flex-shrink:0;font-size:15px}
.ibtn:hover{border-color:var(--border2);background:var(--bg3);color:var(--accent)}
.ibtn.send{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.ibtn.send:hover{background:#d4d4d4}
.ibtn.rec{border-color:var(--red);background:var(--red-dim);color:var(--red)}
.input-meta{display:flex;justify-content:space-between;margin-top:7px;font-size:11px;color:var(--text3)}
kbd{background:var(--bg3);border:1px solid var(--border2);border-radius:3px;padding:0 4px;font-size:10px;font-family:'Geist Mono',monospace;color:var(--text3)}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">
      <svg viewBox="0 0 14 14" fill="none"><path d="M7 1L13 4V10L7 13L1 10V4L7 1Z" stroke="black" stroke-width="1.2" fill="none"/><circle cx="7" cy="7" r="2" fill="black"/></svg>
    </div>
    <span class="hdr-name">Jarvis</span>
  </div>
  <div class="hdr-sep"></div>
  <div class="hdr-stats">
    <div class="hstat">
      <div>
        <div class="hstat-val green" id="hMRR">—</div>
        <div class="hstat-lbl">MRR</div>
      </div>
    </div>
    <div class="hstat">
      <div>
        <div class="hstat-val" id="hPaying">—</div>
        <div class="hstat-lbl">Paying</div>
      </div>
    </div>
    <div class="hstat">
      <div>
        <div class="hstat-val amber" id="hTrials">—</div>
        <div class="hstat-lbl">Trials</div>
      </div>
    </div>
    <div class="hstat">
      <div>
        <div class="hstat-val red" id="hExp">—</div>
        <div class="hstat-lbl">Expiring</div>
      </div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="biz-switcher">
      <button class="biz-btn active">GradeIQ</button>
      <button class="biz-btn add" title="Add business">+</button>
    </div>
    <div class="status-pill"><div class="dot"></div>Online</div>
  </div>
</header>

<div class="pbar" id="pbar"></div>

<div class="body">
  <aside class="sidebar">
    <div class="sb-section">
      <div class="sb-label">Overview</div>
      <div class="metric-row"><span class="metric-key">MRR</span><span class="metric-num green" id="sMRR">—</span></div>
      <div class="metric-row"><span class="metric-key">Paying members</span><span class="metric-num" id="sPaying">—</span></div>
      <div class="metric-row"><span class="metric-key">Active trials</span><span class="metric-num amber" id="sTrials">—</span></div>
      <div class="metric-row"><span class="metric-key">Discord connected</span><span class="metric-num" id="sDiscord">—</span></div>
      <div class="metric-row"><span class="metric-key">Expiring this week</span><span class="metric-num red" id="sExp">—</span></div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Expiring soon</div>
      <div id="expList"><div style="font-size:11px;color:var(--text3)">Loading...</div></div>
    </div>

    <div class="cmds">
      <div class="sb-label" style="padding:0 2px;margin-bottom:8px">Quick commands</div>
      <button class="cmd" onclick="q('Give me a complete morning briefing — MRR, trials expiring, what needs my attention today.')"><div class="cmd-dot"></div>Morning briefing</button>
      <button class="cmd" onclick="q('List every trial expiring in the next 7 days with their email and days remaining.')"><div class="cmd-dot"></div>Expiring trials</button>
      <button class="cmd" onclick="q('Draft a short personal outreach message for each trial expiring this week, in my voice.')"><div class="cmd-dot"></div>Draft outreach</button>
      <button class="cmd" onclick="q('What are the 3 highest leverage moves I should make this week to grow GradeIQ?')"><div class="cmd-dot"></div>Weekly priorities</button>
      <button class="cmd" onclick="q('Write a TikTok script idea that would resonate with sports card investors right now.')"><div class="cmd-dot"></div>TikTok script</button>
      <button class="cmd" onclick="q('How many members have Discord connected vs not? What should I do about the gap?')"><div class="cmd-dot"></div>Discord coverage</button>
      <button class="cmd" onclick="q('What is my trial-to-paid conversion rate and what is a realistic path to $1,000 MRR?')"><div class="cmd-dot"></div>Growth math</button>
      <button class="cmd" onclick="q('Roast GradeIQ. What are my 3 biggest risks or blind spots right now?')"><div class="cmd-dot"></div>Devil's advocate</button>
      <button class="cmd" onclick="q('What content format is most likely to bring me new trial signups this week?')"><div class="cmd-dot"></div>Content strategy</button>
      <button class="cmd" onclick="q('What would it take to get to $10k MRR and how long realistically?')"><div class="cmd-dot"></div>Path to $10k MRR</button>
    </div>
  </aside>

  <div class="chat">
    <div class="msgs" id="msgs"></div>
    <div class="input-wrap">
      <div class="input-row">
        <button class="ibtn" id="vbtn" onclick="toggleVoice()" title="Voice input">🎤</button>
        <textarea id="inp" placeholder="Ask Jarvis anything..." rows="1" onkeydown="hk(event)" oninput="grow(this)"></textarea>
        <button class="ibtn send" onclick="send()" title="Send">↑</button>
      </div>
      <div class="input-meta">
        <span><kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for new line</span>
        <span>Private session</span>
      </div>
    </div>
  </div>
</div>

<script>
const SB_URL='https://lmwqizcflhikvtoqehzj.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxtd3FpemNmbGhpa3Z0b3FlaHpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDQ5NDMsImV4cCI6MjA4OTk4MDk0M30.95XMeRWGeCcD_KxN40ciJi_QjB9GG4sVJexzBEhJ9NM';
const PRICE=19.99;

let biz=null,hist=[],tyEl=null,isRec=false,rec=null;

async function dbq(t,p=''){
  const r=await fetch(`${SB_URL}/rest/v1/${t}?${p}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}});
  return r.json();
}

async function loadBiz(){
  try{
    const m=await dbq('whop_members','select=*');
    const now=new Date();
    const active=m.filter(x=>x.status==='active');
    const paying=active.filter(x=>(now-new Date(x.joined_at))/86400000>30);
    const trials=active.filter(x=>(now-new Date(x.joined_at))/86400000<=30);
    const exp=trials.map(x=>{
      const d=Math.floor((now-new Date(x.joined_at))/86400000);
      return{...x,ds:d,dl:30-d};
    }).filter(x=>x.dl<=7&&x.dl>=0).sort((a,b)=>a.dl-b.dl);
    biz={
      mrr:(paying.length*PRICE).toFixed(2),
      paying:paying.length,
      trials:trials.length,
      inactive:m.filter(x=>x.status==='inactive').length,
      total:m.length,
      exp,
      discOn:active.filter(x=>x.discord_id).length,
      discOff:active.filter(x=>!x.discord_id).length,
      active:active.length,
    };
    renderSB();
  }catch(e){console.error(e);}
}

function renderSB(){
  if(!biz)return;
  const{mrr,paying,trials,exp,discOn,active}=biz;
  document.getElementById('hMRR').textContent=`$${mrr}`;
  document.getElementById('hPaying').textContent=paying;
  document.getElementById('hTrials').textContent=trials;
  document.getElementById('hExp').textContent=exp.length;
  document.getElementById('sMRR').textContent=`$${mrr}`;
  document.getElementById('sPaying').textContent=paying;
  document.getElementById('sTrials').textContent=trials;
  document.getElementById('sDiscord').textContent=`${discOn} / ${active}`;
  document.getElementById('sExp').textContent=exp.length;
  const el=document.getElementById('expList');
  if(!exp.length){el.innerHTML=`<div style="font-size:11px;color:var(--text3)">None this week</div>`;return;}
  el.innerHTML=exp.slice(0,6).map(x=>{
    const name=(x.email||'').split('@')[0];
    const cls=x.dl<=2?'tag-red':x.dl<=4?'tag-amber':'tag-green';
    return`<div class="exp-row"><span class="exp-email">${name}</span><span class="tag ${cls}">${x.dl}d</span></div>`;
  }).join('');
}

function sys(){
  if(!biz)return"You are Jarvis, Jordan's AI business assistant for GradeIQ.";
  const expStr=biz.exp.map(x=>`${x.email} — ${x.dl} days left`).join('\n')||'None';
  return`You are Jarvis — Jordan's personal AI business operating system.

Jordan founded GradeIQ (gradeiq.co), a sports card investment platform using expected value math to surface raw-to-grade opportunities across PSA submission tiers. Built with no coding background using Claude as a partner. Entrepreneurial, gets bored fast, wants GradeIQ running on 30 min/day while building more companies.

LIVE DATA RIGHT NOW:
MRR: $${biz.mrr}
Paying members: ${biz.paying}
Active trials: ${biz.trials}
Inactive/churned: ${biz.inactive}
Total ever: ${biz.total}
Discord connected: ${biz.discOn} of ${biz.active} active members
Expiring this week: ${biz.exp.length}

EXPIRING TRIALS:
${expStr}

CONTEXT:
Price: $19.99/month, 30-day trial
Stack: Cloudflare Workers, Supabase, Whop, Resend, n8n
Distribution: TikTok, Discord, podcast (The Sharp Collector by GradeIQ)
Already running: automated 5-email trial onboarding sequence via n8n
Goal: $10k MRR mostly automated, then launch business #2

JORDAN'S VOICE when drafting messages:
Casual, direct, no fluff. Short sentences. Never corporate. Signs off "— Jordan, GradeIQ"

You manage GradeIQ now and future businesses. Respond concisely and directly. Use the live data above. Bold key numbers. Never pad.`;
}

async function send(){
  const el=document.getElementById('inp');
  const txt=el.value.trim();
  if(!txt)return;
  el.value='';grow(el);
  addMsg('user',txt);
  hist.push({role:'user',content:txt});
  showTyp();setPbar(true);
  try{
    const res=await fetch('/api/jarvis',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,system:sys(),messages:hist})
    });
    const d=await res.json();
    const reply=d.content?.[0]?.text||'No response received.';
    hideTyp();addMsg('jarvis',reply);
    hist.push({role:'assistant',content:reply});
  }catch(e){hideTyp();addMsg('jarvis',`Connection error: ${e.message}`);}
  setPbar(false);
}

function q(txt){document.getElementById('inp').value=txt;send();}

function addMsg(role,txt){
  const wrap=document.getElementById('msgs');
  const d=document.createElement('div');
  d.className=`msg ${role}`;
  const av=role==='jarvis'
    ?`<div class="av av-j">J</div>`
    :`<div class="av av-u">You</div>`;
  d.innerHTML=`${av}<div class="msg-inner"><div class="msg-who">${role==='jarvis'?'Jarvis':'Jordan'}</div><div class="bubble bubble-${role==='jarvis'?'j':'u'}">${fmt(txt)}</div></div>`;
  wrap.appendChild(d);
  wrap.scrollTop=wrap.scrollHeight;
}

function fmt(t){
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/^### (.+)$/gm,'<span class="sh">$1</span>')
    .replace(/^## (.+)$/gm,'<span class="sh">$1</span>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>')
    .replace(/\n/g,'<br>');
}

let tyEl2=null;
function showTyp(){
  const wrap=document.getElementById('msgs');
  tyEl2=document.createElement('div');
  tyEl2.className='msg jarvis';
  tyEl2.innerHTML=`<div class="av av-j">J</div><div class="msg-inner"><div class="msg-who">Jarvis</div><div class="bubble bubble-j"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
  wrap.appendChild(tyEl2);wrap.scrollTop=wrap.scrollHeight;
}
function hideTyp(){tyEl2?.remove();tyEl2=null;}
function setPbar(on){document.getElementById('pbar').classList.toggle('on',on);}
function hk(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function grow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

function toggleVoice(){
  const btn=document.getElementById('vbtn');
  if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){
    addMsg('jarvis','Voice input requires Chrome.');return;
  }
  if(isRec){rec?.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  rec=new SR();rec.lang='en-US';
  rec.onstart=()=>{isRec=true;btn.classList.add('rec');btn.textContent='⏹';};
  rec.onresult=e=>{document.getElementById('inp').value=e.results[0][0].transcript;send();};
  rec.onend=()=>{isRec=false;btn.classList.remove('rec');btn.textContent='🎤';};
  rec.start();
}

async function boot(){
  const h=new Date().getHours();
  const t=h<12?'morning':h<17?'afternoon':'evening';
  addMsg('jarvis',`Good ${t}, Jordan. Loading GradeIQ data...`);
  setPbar(true);await loadBiz();setPbar(false);
  if(biz){
    const urg=biz.exp.filter(x=>x.dl<=3).length;
    let msg=`**$${biz.mrr} MRR** — ${biz.paying} paying members, ${biz.trials} active trials.`;
    if(biz.exp.length){
      msg+=`\n\n**${biz.exp.length} trial${biz.exp.length>1?'s':''} expiring this week.**`;
      if(urg)msg+=` ${urg} expire in 3 days or less.`;
    }
    msg+=`\n\nWhat do you need?`;
    addMsg('jarvis',msg);
    hist.push({role:'assistant',content:msg});
  }
}
boot();
</script>
