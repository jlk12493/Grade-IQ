<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#B6FF00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="GradeIQ">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Buy Signals — GradeIQ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/shared.js"></script>
<style>
/* ── PAGE-SPECIFIC STYLES ─────────────────────────────────────── */

/* Trial banner */
#trial-banner{display:none;background:rgba(182,255,0,.08);border:1px solid rgba(182,255,0,.2);border-radius:8px;padding:10px 16px;margin-bottom:16px;align-items:center;gap:10px;font-size:12px;color:var(--green);}
#trial-banner .tb-icon{font-size:18px;}

/* Top Picks strip */
.top-picks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:20px;}
.tp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;cursor:pointer;transition:border-color .15s;}
.tp-card:hover{border-color:rgba(182,255,0,.4);}
.tp-card .tp-iq{font-size:22px;font-weight:900;color:var(--green);line-height:1;}
.tp-card .tp-player{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:4px;}
.tp-card .tp-set{font-size:10px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tp-card .tp-ev{font-size:11px;color:var(--green);font-weight:700;margin-top:5px;}

/* Filter pill bar */
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:16px;}
.filter-row{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap;}
.filter-group{display:flex;flex-direction:column;gap:5px;}
.filter-label{font-size:9px;font-weight:700;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;}
.filter-pills{display:flex;gap:4px;flex-wrap:wrap;}
.pill{background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.pill.active{background:rgba(182,255,0,.15);border-color:var(--green);color:var(--green);}
.pill:hover:not(.active){border-color:var(--text-muted);color:var(--text);}

/* Range sliders inline */
.range-group{display:flex;align-items:center;gap:6px;}
.range-inp{background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:11px;width:72px;outline:none;}
.range-inp:focus{border-color:var(--green);}
.range-sep{font-size:11px;color:var(--text-muted);}

/* Search + controls bar */
.ctrl-bar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
.ctrl-bar .fi{font-size:12px;padding:7px 12px;}

/* Results count */
.results-count{font-size:12px;color:var(--text-muted);white-space:nowrap;}
.results-count strong{color:var(--text);}
.new-badge{display:none;margin-left:6px;color:var(--green);font-weight:700;font-size:12px;}

/* Filter toggle (mobile) */
.filter-toggle-btn{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;display:none;align-items:center;gap:6px;}
.filter-toggle-btn .fc-badge{background:var(--green);color:#000;border-radius:10px;font-size:9px;font-weight:800;padding:1px 5px;display:none;}
@media(max-width:768px){
  .filter-toggle-btn{display:flex;}
  .filter-bar{display:none;}
  .filter-bar.mob-open{display:block;}
  .range-group{flex-wrap:wrap;}
  .filter-row{gap:14px;}
}

/* Card list */
.signal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color .15s;}
.signal-card:hover{border-color:rgba(182,255,0,.3);}
.signal-card-head{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;}
.sc-thumb{flex-shrink:0;width:80px;height:112px;border-radius:8px;overflow:hidden;background:var(--surface-2);border:1px solid var(--border);}
.sc-thumb img{width:100%;height:100%;object-fit:cover;}
.sc-thumb-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.sc-info{flex:1;min-width:0;}
.sc-chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
.sc-player{font-size:17px;font-weight:800;color:var(--text);line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-set{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.sc-scores{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;}
.sc-iq{font-size:28px;font-weight:900;line-height:1;}
.sc-iq-lbl{font-size:8px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;text-align:right;}
.sc-ev{font-size:12px;font-weight:700;text-align:right;margin-top:3px;}
.sc-buy{font-size:11px;color:var(--text-muted);text-align:right;}
.sc-chev{font-size:10px;color:var(--text-muted);margin-top:5px;transition:transform .2s;}
.sc-chev.open{transform:rotate(90deg);}

/* Expanded detail */
.sc-detail{display:none;border-top:1px solid var(--border);}
.sc-detail.open{display:block;}
.sc-price-trio{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px;}
.sc-price-col{flex:1;padding:10px 12px;text-align:center;}
.sc-price-col+.sc-price-col{border-left:1px solid var(--border);}
.sc-price-col.highlight{background:rgba(182,255,0,.04);}
.sc-price-lbl{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.sc-price-val{font-size:16px;font-weight:800;}
.ev-band{display:flex;margin:0 16px 12px;border:1px solid rgba(182,255,0,.2);border-radius:8px;overflow:hidden;background:rgba(182,255,0,.04);}
.ev-band-col{flex:1;padding:10px 14px;}
.ev-band-col+.ev-band-col{border-left:1px solid rgba(182,255,0,.15);}
.ev-band-lbl{font-size:8px;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.ev-band-val{font-size:17px;font-weight:900;}
.sc-stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:12px;}
.sc-stat{background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;}
.sc-stat-lbl{font-size:8px;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.sc-stat-val{font-size:15px;font-weight:800;}
.tier-table{width:100%;border-collapse:collapse;font-size:11px;}
.tier-table th{padding:6px 10px;text-align:left;color:var(--text-muted);font-weight:600;background:var(--surface-2);}
.tier-table th:not(:first-child){text-align:right;}
.tier-table td{padding:6px 10px;border-top:1px solid var(--border);}
.tier-table td:not(:first-child){text-align:right;}
.tier-best-badge{font-size:8px;background:var(--green);color:#000;padding:1px 4px;border-radius:3px;font-weight:700;margin-left:4px;}
.sc-actions{display:flex;gap:8px;flex-wrap:wrap;padding:12px 16px 16px;}
.btn-a{background:var(--green);color:#000;border:none;padding:7px 14px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;}
.btn-a:hover{opacity:.9;}
.btn-c{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:7px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;}
.btn-c:hover{border-color:var(--green);color:var(--green);}

/* Edit panel */
.giq-edit-panel{display:none;margin:0 16px 16px;background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:6px;padding:12px;}

/* chip helpers */
.chip{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.5px;}

/* Divider */
.divider{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-label{font-size:11px;color:var(--text-muted);}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px;}

/* Loading */
.loading-shimmer{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:10px;animation:shimmer 1.5s infinite;}
@keyframes shimmer{0%,100%{opacity:.6;}50%{opacity:1;}}
</style>
</head>
<body>
<script>buildNav('signals');</script>

<div class="main">

  <!-- TRIAL BANNER -->
  <div id="trial-banner">
    <span class="tb-icon">⏱</span>
    <span id="trial-text">Free trial active</span>
    <span style="margin-left:auto;font-size:11px;opacity:.7;">Upgrade on Whop to keep access</span>
  </div>

  <!-- TOP PICKS SECTION -->
  <div style="margin-bottom:20px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div style="font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;">⭐ Top Picks Today</div>
      <div style="font-size:10px;color:var(--text-muted);">Highest IQ this scan cycle</div>
    </div>
    <div class="top-picks-grid" id="top-picks-grid">
      <!-- populated by JS -->
    </div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-label">All Buy Signals</span>
    <div class="divider-line"></div>
  </div>

  <!-- SEARCH + CONTROLS -->
  <div class="ctrl-bar">
    <input class="fi" type="text" id="giq-search" placeholder="🔍 Search player or set..." oninput="filterSignals()" style="flex:1;min-width:160px;">
    <select class="fi" id="giq-sort" onchange="filterSignals()" style="min-width:180px;">
      <option value="scc_score">IQ Rating High→Low</option>
      <option value="ev_pct">EV% High→Low</option>
      <option value="gem_rate">Gem Rate High→Low</option>
      <option value="annualized">Annualized Return High→Low</option>
      <option value="raw_price">Raw Price Low→High</option>
    </select>
    <button class="filter-toggle-btn" id="filter-mob-btn" onclick="toggleMobFilters()">
      🎛 Filters <span class="fc-badge" id="filter-mob-badge"></span>
    </button>
    <button onclick="clearAllFilters()" style="background:transparent;border:1px solid var(--border);color:var(--text-muted);font-size:11px;cursor:pointer;padding:7px 12px;border-radius:6px;font-weight:600;white-space:nowrap;">Clear All</button>
    <div class="results-count">Showing <strong id="giq-showing">--</strong> of <strong id="giq-total">--</strong> <span class="new-badge" id="giq-new-badge"></span></div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar" id="filter-bar">

    <!-- ROW 1: Sport + Card Type -->
    <div style="display:flex;align-items:flex-start;gap:0;flex-wrap:wrap;">
      <div style="flex:1;min-width:0;padding-right:20px;border-right:1px solid var(--border);">
        <div class="filter-label" style="margin-bottom:8px;">Sport</div>
        <div class="filter-pills">
          <button class="pill active giq-sport-pill" data-sport="" onclick="setSportPill(this)">All</button>
          <button class="pill giq-sport-pill" data-sport="Baseball" onclick="setSportPill(this)">⚾ Baseball</button>
          <button class="pill giq-sport-pill" data-sport="Football" onclick="setSportPill(this)">🏈 Football</button>
          <button class="pill giq-sport-pill" data-sport="Basketball" onclick="setSportPill(this)">🏀 Basketball</button>
          <button class="pill giq-sport-pill" data-sport="TCG" onclick="setSportPill(this)">🃏 TCG</button>
        </div>
      </div>
      <div style="padding-left:20px;">
        <div class="filter-label" style="margin-bottom:8px;">Card Type</div>
        <div class="filter-pills">
          <button class="pill active giq-type-pill" data-type="" onclick="setTypePill(this)">All</button>
          <button class="pill giq-type-pill" data-type="base" onclick="setTypePill(this)">Base Only</button>
          <button class="pill giq-type-pill" data-type="parallel" onclick="setTypePill(this)">Parallels Only</button>
        </div>
      </div>
    </div>

    <!-- ROW 2: Grading Tier (full width) -->
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
      <div class="filter-label" style="margin-bottom:8px;">Grading Tier</div>
      <div class="filter-pills" id="tier-pills">
        <span style="font-size:11px;color:var(--text-muted);">Loading...</span>
      </div>
    </div>

    <!-- ROW 3: Numeric ranges -->
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">

      <div class="filter-group">
        <div class="filter-label">IQ Score</div>
        <div class="range-group">
          <input class="range-inp" type="number" id="giq-iq-min" placeholder="Min" min="0" max="100" oninput="filterSignals()">
          <span class="range-sep">–</span>
          <input class="range-inp" type="number" id="giq-iq-max" placeholder="Max" min="0" max="100" oninput="filterSignals()">
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-label">EV%</div>
        <div class="range-group">
          <input class="range-inp" type="number" id="giq-ev-min" placeholder="Min" min="0" oninput="filterSignals()">
          <span class="range-sep">–</span>
          <input class="range-inp" type="number" id="giq-ev-max" placeholder="Max" min="0" oninput="filterSignals()">
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-label">Gem Rate %</div>
        <div class="range-group">
          <input class="range-inp" type="number" id="giq-gem-min" placeholder="Min" min="0" max="100" oninput="filterSignals()">
          <span class="range-sep">–</span>
          <input class="range-inp" type="number" id="giq-gem-max" placeholder="Max" min="0" max="100" oninput="filterSignals()">
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-label">Raw Price $</div>
        <div class="range-group">
          <input class="range-inp" type="number" id="giq-price-min" placeholder="Min" min="0" oninput="filterSignals()">
          <span class="range-sep">–</span>
          <input class="range-inp" type="number" id="giq-price-max" placeholder="Max" min="0" oninput="filterSignals()">
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-label">Annualized Return %</div>
        <div class="range-group">
          <input class="range-inp" type="number" id="giq-ann-min" placeholder="Min" min="0" oninput="filterSignals()">
          <span class="range-sep">–</span>
          <input class="range-inp" type="number" id="giq-ann-max" placeholder="Max" min="0" oninput="filterSignals()">
        </div>
      </div>

    </div>
  </div>

  <!-- CARD LIST -->
  <div id="signal-list">
    <!-- Loading shimmer -->
    <div class="loading-shimmer" style="height:90px;"></div>
    <div class="loading-shimmer" style="height:90px;opacity:.7;"></div>
    <div class="loading-shimmer" style="height:90px;opacity:.5;"></div>
  </div>

</div><!-- /main -->

<script>
// ──────────────────────────────────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────────────────────────────────
var SIGNALS = [];         // raw data from ev_scanner
var FILTERED = [];        // after filter/sort
var GRADING_TIERS = [];
var SELECTED_TIERS = [];  // tier names currently active
var SELECTED_SPORT = '';  // '' = all
var SELECTED_TYPE  = '';  // '' | 'base' | 'parallel'
var LAST_VISIT = (function(){ try{return parseInt(localStorage.getItem('giq_last_visit')||'0');}catch(e){return 0;} })();
var BOOKMARKS  = (function(){ try{return JSON.parse(localStorage.getItem('giq_bookmarks')||'{}');}catch(e){return{};} })();
var ADMIN_EMAIL = 'jlk12493@gmail.com';

// ──────────────────────────────────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────────────────────────────────
(async function init(){
  var user = await requireAuth();
  if (!user) return;
  showTrialBanner(user);
  await Promise.all([loadGradingTiers(), loadSignals()]);
})();

async function loadGradingTiers(){
  var res = await sb.from('grading_tiers').select('*').eq('active', true).order('cost_per_card', {ascending: true});
  var seen = {};
  GRADING_TIERS = (res.data || []).filter(function(t){
    if (seen[t.tier_name]) return false;
    seen[t.tier_name] = true;
    return true;
  });
  SELECTED_TIERS = GRADING_TIERS.map(function(t){ return t.tier_name; });
  renderTierPills();
}

async function loadSignals(){
  var all = [], page = 0;
  while (true) {
    var res = await sb.from('ev_scanner')
      .select('scp_id,player,parallel,year,set_name,card_no,sport,ev_pct,ev_dollar,scc_score,raw_price,max_buy_40,max_buy_35,decision,psa10_price,psa9_price,net_psa10,net_psa9,actual_gem_rate,sales_volume,scanned_at,image_url')
      .eq('decision','BUY')
      .order('scc_score',{ascending:false,nullsFirst:false})
      .range(page*1000,(page+1)*1000-1);
    var chunk = res.data || [];
    all = all.concat(chunk);
    if (chunk.length < 1000) break;
    page++;
  }
  SIGNALS = all;
  filterSignals();
}

// ──────────────────────────────────────────────────────────────────────────
// TRIAL BANNER
// ──────────────────────────────────────────────────────────────────────────
function showTrialBanner(user){
  if (!user || user.email === ADMIN_EMAIL) return;
  sb.from('whop_members').select('joined_at').eq('email', user.email).single().then(function(res){
    if (!res.data || !res.data.joined_at) return;
    var joined = new Date(res.data.joined_at);
    var daysSince = Math.floor((new Date() - joined) / 86400000);
    if (daysSince >= 30) return;
    var daysLeft = 30 - daysSince;
    var banner = g('trial-banner');
    var text = g('trial-text');
    if (banner){ banner.style.display = 'flex'; }
    if (text) text.textContent = 'Free trial — Day ' + daysSince + ' of 30 · ' + daysLeft + ' days remaining';
  });
}

// ──────────────────────────────────────────────────────────────────────────
// TIER PILLS
// ──────────────────────────────────────────────────────────────────────────
function renderTierPills(){
  var el = g('tier-pills');
  if (!el) return;
  var html = '<button class="pill active" id="tier-all-pill" onclick="toggleAllTiers(this)">All Tiers</button>';
  GRADING_TIERS.forEach(function(t){
    html += '<button class="pill active giq-tier-pill" data-tier="'+t.tier_name+'" onclick="toggleTierPill(this)">'+t.tier_name+'</button>';
  });
  el.innerHTML = html;
}

function toggleAllTiers(btn){
  var pills = document.querySelectorAll('.giq-tier-pill');
  var allActive = Array.from(pills).every(function(p){ return p.classList.contains('active'); });
  if (allActive) {
    pills.forEach(function(p){ p.classList.remove('active'); });
    btn.textContent = 'None';
    SELECTED_TIERS = [];
  } else {
    pills.forEach(function(p){ p.classList.add('active'); });
    btn.textContent = 'All Tiers';
    SELECTED_TIERS = GRADING_TIERS.map(function(t){ return t.tier_name; });
  }
  filterSignals();
}

function toggleTierPill(btn){
  btn.classList.toggle('active');
  SELECTED_TIERS = Array.from(document.querySelectorAll('.giq-tier-pill.active')).map(function(p){ return p.dataset.tier; });
  var allBtn = g('tier-all-pill');
  if (allBtn) {
    var allActive = SELECTED_TIERS.length === GRADING_TIERS.length;
    allBtn.textContent = allActive ? 'All Tiers' : 'None';
    allBtn.classList.toggle('active', allActive);
  }
  filterSignals();
}

function setSportPill(btn){
  document.querySelectorAll('.giq-sport-pill').forEach(function(p){ p.classList.remove('active'); });
  btn.classList.add('active');
  SELECTED_SPORT = btn.dataset.sport || '';
  filterSignals();
}

function setTypePill(btn){
  document.querySelectorAll('.giq-type-pill').forEach(function(p){ p.classList.remove('active'); });
  btn.classList.add('active');
  SELECTED_TYPE = btn.dataset.type || '';
  filterSignals();
}

function toggleMobFilters(){
  var bar = g('filter-bar');
  if (!bar) return;
  bar.classList.toggle('mob-open');
}

// ──────────────────────────────────────────────────────────────────────────
// EV CALC (ported directly from app.html)
// ──────────────────────────────────────────────────────────────────────────
function calcEVForTier(r, tierCost){
  var PLATFORM_FEE = 0.135;
  var net10 = (r.psa10_price || 0) * (1 - PLATFORM_FEE);
  var net9  = r.psa9_price ? r.psa9_price * (1 - PLATFORM_FEE) : net10 * 0.30;
  var gemRate = r.actual_gem_rate || 0;
  var nonGemRate = 1 - gemRate;
  var expectedReturn = (gemRate * net10) + (nonGemRate * 0.80 * net9);
  var totalCost = (r.raw_price || 0) + tierCost;
  var evDollar = expectedReturn - totalCost;
  var evPct = totalCost > 0 ? evDollar / totalCost : 0;
  return { evDollar: evDollar, evPct: evPct, expectedReturn: expectedReturn };
}

function calcAnnualizedReturn(evPct, calendarDays){
  if (!calendarDays || calendarDays <= 0) return null;
  return Math.pow(1 + evPct, 365 / calendarDays) - 1;
}

function calcCardStats(r, activeTiers){
  var result = {iq: r.scc_score||0, evPct: r.ev_pct||0, evDollar: r.ev_dollar||0, annualized: null, maxBuy: r.max_buy_40||0, tierName: null, viable: true};
  if (!activeTiers || !activeTiers.length || !r.psa10_price) return result;
  var bestAnn = -Infinity, foundViable = false;
  var allSelected = activeTiers.length === GRADING_TIERS.length;
  activeTiers.forEach(function(t){
    var ev = calcEVForTier(r, t.cost_per_card);
    var days = (t.turnaround_business_days_avg || 0) * 1.4;
    var ann = calcAnnualizedReturn(ev.evPct, days);
    if (ev.evDollar > 0 && ev.evPct >= 0.40 && ann !== null && ann > bestAnn){
      bestAnn = ann; foundViable = true;
      result.evPct = ev.evPct; result.evDollar = ev.evDollar;
      result.annualized = ann; result.tierName = t.tier_name;
      result.maxBuy = (ev.expectedReturn / 1.40) - t.cost_per_card;
    }
  });
  if (foundViable) { result.iq = r.scc_score || 0; result.viable = true; }
  else if (allSelected) { result.viable = true; }
  else { result.viable = false; result.iq = 0; }
  return result;
}

function getActiveTiers(){
  return GRADING_TIERS.filter(function(t){ return SELECTED_TIERS.includes(t.tier_name); });
}

// ──────────────────────────────────────────────────────────────────────────
// FILTER + SORT
// ──────────────────────────────────────────────────────────────────────────
function filterSignals(){
  var sort    = (g('giq-sort') || {value:'scc_score'}).value;
  var search  = ((g('giq-search') || {value:''}).value || '').toLowerCase().trim();
  var iqMin   = parseFloat((g('giq-iq-min') || {value:''}).value) || 0;
  var iqMax   = parseFloat((g('giq-iq-max') || {value:''}).value) || 0;
  var evMin   = parseFloat((g('giq-ev-min') || {value:''}).value) || 0;
  var evMax   = parseFloat((g('giq-ev-max') || {value:''}).value) || 0;
  var gemMin  = parseFloat((g('giq-gem-min') || {value:''}).value) || 0;
  var gemMax  = parseFloat((g('giq-gem-max') || {value:''}).value) || 0;
  var prMin   = parseFloat((g('giq-price-min') || {value:''}).value) || 0;
  var prMax   = parseFloat((g('giq-price-max') || {value:''}).value) || 0;
  var annMin  = parseFloat((g('giq-ann-min') || {value:''}).value) || 0;
  var annMax  = parseFloat((g('giq-ann-max') || {value:''}).value) || 0;

  var activeTiers = getActiveTiers();
  var statsCache = {};
  function getStats(r){ var k=r.scp_id; if(!statsCache[k]) statsCache[k]=calcCardStats(r,activeTiers); return statsCache[k]; }

  FILTERED = SIGNALS.filter(function(r){
    if (SELECTED_SPORT && r.sport !== SELECTED_SPORT) return false;
    if (SELECTED_TYPE === 'base' && r.parallel) return false;
    if (SELECTED_TYPE === 'parallel' && !r.parallel) return false;
    var pr = r.raw_price || 0;
    if (prMin && pr < prMin) return false;
    if (prMax && pr > prMax) return false;
    var gem = (r.actual_gem_rate || 0) * 100;
    if (gemMin && gem < gemMin) return false;
    if (gemMax && gem > gemMax) return false;
    var s = getStats(r);
    if (!s.viable) return false;
    if (iqMin && s.iq < iqMin) return false;
    if (iqMax && s.iq > iqMax) return false;
    var evPct = s.evPct * 100;
    if (evMin && evPct < evMin) return false;
    if (evMax && evPct > evMax) return false;
    if (annMin || annMax){
      var annPct = s.annualized !== null ? s.annualized * 100 : -Infinity;
      if (annMin && annPct < annMin) return false;
      if (annMax && annPct > annMax) return false;
    }
    if (search && !(r.player||'').toLowerCase().includes(search) && !(r.set_name||'').toLowerCase().includes(search)) return false;
    return true;
  });

  FILTERED.sort(function(a,b){
    if (sort === 'scc_score')   return getStats(b).iq - getStats(a).iq;
    if (sort === 'ev_pct')      return getStats(b).evPct - getStats(a).evPct;
    if (sort === 'gem_rate')    return (b.actual_gem_rate||0) - (a.actual_gem_rate||0);
    if (sort === 'annualized')  return (getStats(b).annualized||0) - (getStats(a).annualized||0);
    return (a.raw_price||0) - (b.raw_price||0);
  });

  // update counts
  var showing = g('giq-showing'), total = g('giq-total');
  if (showing) showing.textContent = FILTERED.length;
  if (total) total.textContent = SIGNALS.length;

  // new badge
  var now = Date.now();
  var newCount = FILTERED.filter(function(r){ return r.scanned_at && new Date(r.scanned_at).getTime() > LAST_VISIT; }).length;
  var badge = g('giq-new-badge');
  if (badge){ badge.style.display = newCount > 0 ? 'inline' : 'none'; if(newCount>0) badge.textContent = '+'+newCount+' new'; }

  renderTopPicks();
  renderSignals();
}

function clearAllFilters(){
  SELECTED_SPORT = ''; SELECTED_TYPE = '';
  SELECTED_TIERS = GRADING_TIERS.map(function(t){ return t.tier_name; });
  document.querySelectorAll('.giq-sport-pill').forEach(function(p){ p.classList.toggle('active', p.dataset.sport === ''); });
  document.querySelectorAll('.giq-type-pill').forEach(function(p){ p.classList.toggle('active', p.dataset.type === ''); });
  document.querySelectorAll('.giq-tier-pill').forEach(function(p){ p.classList.add('active'); });
  var allBtn = g('tier-all-pill'); if(allBtn){ allBtn.classList.add('active'); allBtn.textContent='All Tiers'; }
  ['giq-iq-min','giq-iq-max','giq-ev-min','giq-ev-max','giq-gem-min','giq-gem-max','giq-price-min','giq-price-max','giq-ann-min','giq-ann-max'].forEach(function(id){ var el=g(id); if(el) el.value=''; });
  if(g('giq-search')) g('giq-search').value = '';
  if(g('giq-sort')) g('giq-sort').value = 'scc_score';
  filterSignals();
}

function sportChipHtml(sport){

  else if(/silver prizm/i.test(parallel)){bg='rgba(148,163,184,.12)';color='#94a3b8';border='rgba(148,163,184,.25)';}
  else if(/gold/i.test(parallel)){bg='rgba(234,179,8,.15)';color='#fbbf24';border='rgba(234,179,8,.3)';}
  else if(/refractor|prizm|holo/i.test(parallel)){bg='rgba(16,185,129,.12)';color='#34d399';border='rgba(16,185,129,.25)';}
  return '<span class="chip" style="background:'+bg+';color:'+color+';border:1px solid '+border+';">'+parallel+'</span>';

function goToCard(scpId){
  window.location.href = 'card.html?id=' + encodeURIComponent(scpId);
}

// ──────────────────────────────────────────────────────────────────────────
// CARD EXPAND / COLLAPSE
// ──────────────────────────────────────────────────────────────────────────
function toggleCard(idx){
  var detail = g('sc-detail-'+idx);
  var chev   = g('sc-chev-'+idx);
  if (!detail) return;
  var open = detail.classList.toggle('open');
  if (chev) chev.classList.toggle('open', open);
}

function toggleEdit(idx, e){
  if (e) e.stopPropagation();
  var panel = g('sc-edit-'+idx);
  if (!panel) return;
  panel.style.display = panel.style.display === 'none' || !panel.style.display ? 'block' : 'none';
}

// ──────────────────────────────────────────────────────────────────────────
// ADMIN SAVE
// ──────────────────────────────────────────────────────────────────────────
async function saveEdit(scpId, idx){
  if (!CU || CU.email !== ADMIN_EMAIL) return;
  var raw = parseFloat(g('gedit-raw-'+idx).value) || 0;
  var p10 = parseFloat(g('gedit-p10-'+idx).value) || 0;
  var p9v = g('gedit-p9-'+idx).value;
  var p9  = p9v ? parseFloat(p9v) : 0;
  if (!raw || !p10){ toast('Raw and PSA10 required', true); return; }
  if (p10 <= raw){ toast('PSA10 must exceed raw price', true); return; }

  var PLATFORM_FEE = 0.135;
  var n10 = p10 * (1 - PLATFORM_FEE);
  var n9  = (p9 > 0 && p9 < p10) ? p9 * (1 - PLATFORM_FEE) : n10 * 0.30;
  var r   = FILTERED[idx];
  var gem = r.actual_gem_rate || 0;
  var expRet = gem * n10 + (1 - gem) * 0.80 * n9;
  var evDollar = expRet - raw;
  var evPct    = raw > 0 ? evDollar / raw : 0;
  var maxBuy   = (expRet / 1.40);

  // Re-calculate SCC score
  var sccScore = calcSCCScoreJS(evPct, r.sales_volume||0, gem, 0, 0, 0, null);

  var updates = { raw_price: raw, psa10_price: p10, net_psa10: n10, psa9_price: p9||null, net_psa9: p9?n9:null, ev_dollar: evDollar, ev_pct: evPct, max_buy_40: maxBuy, scc_score: sccScore };
  var res = await sb.from('ev_scanner').update(updates).eq('scp_id', scpId);
  if (res.error){ toast('Error: '+res.error.message, true); return; }
  // Update in-memory
  var origIdx = SIGNALS.findIndex(function(s){ return s.scp_id === scpId; });
  if (origIdx !== -1) SIGNALS[origIdx] = Object.assign({}, SIGNALS[origIdx], updates);
  var filtIdx = FILTERED.findIndex(function(s){ return s.scp_id === scpId; });
  if (filtIdx !== -1) FILTERED[filtIdx] = Object.assign({}, FILTERED[filtIdx], updates);
  toggleEdit(idx);
  renderSignals();
  toast('Prices updated!');
}

function calcSCCScoreJS(evPct, salesVolume, actualGemRate, impliedGemRate, totalPop, momentum, annualizedReturn){
  var evScore = Math.min(evPct/1.0, 1.0) * 35;
  var volScore = salesVolume > 0 ? Math.min(Math.log10(salesVolume)/Math.log10(500), 1.0) * 25 : 0;
  var edgeScore = 0;
  if (impliedGemRate > 0 && totalPop >= 20){
    var edgeRatio = Math.min(actualGemRate/impliedGemRate, 3.0)/3.0;
    var popWeight = Math.min(totalPop/500, 1.0);
    edgeScore = edgeRatio * popWeight * 20;
  }
  var annScore = 0;
  if (annualizedReturn !== null && annualizedReturn > 0) annScore = Math.min(annualizedReturn/2.0, 1.0) * 15;
  var momentumScore = 0;
  if (momentum !== null && momentum > 0) momentumScore = Math.min(momentum/100, 1.0) * 5;
  return Math.min(100, Math.round((evScore+volScore+edgeScore+annScore+momentumScore)*10)/10);
}

// ──────────────────────────────────────────────────────────────────────────
// ADD TO INVENTORY (placeholder — My Collection page will own this fully)
// ──────────────────────────────────────────────────────────────────────────
function addToInventory(idx, e){
  if (e) e.stopPropagation();
  var r = FILTERED[idx];
  if (!r) return;
  // Store in sessionStorage so collection.html can pre-fill the add form
  try{
    sessionStorage.setItem('giq_add_card', JSON.stringify({
      player: r.player||'',
      year: r.year||'',
      set_name: r.set_name||'',
      card_no: r.card_no||'',
      parallel: r.parallel||'',
      sport: r.sport||'',
      raw_price: r.raw_price||0,
      source: 'Buy Signals',
      scp_id: r.scp_id||'',
      psa10: r.psa10_price||0,
      psa9: r.psa9_price||0,
      gem_rate: r.actual_gem_rate||0,
      image_url: r.image_url||''
    }));
  }catch(e2){}
  window.location.href = 'collection.html?add=1';
}
