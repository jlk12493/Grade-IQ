name: GradeIQ Nightly Pipeline

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Population Refresh
        run: |
          response=$(curl -s -o response.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${{ secrets.SUPABASE_URL }}/functions/v1/population-refresh")
          echo "Population Refresh Status: $response"
          cat response.txt

      - name: Pricing Refresh
        run: |
          response=$(curl -s -o response.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${{ secrets.SUPABASE_URL }}/functions/v1/pricing-refresh")
          echo "Pricing Refresh Status: $response"
          cat response.txt

      - name: EV Calculate
        run: |
          response=$(curl -s -o response.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${{ secrets.SUPABASE_URL }}/functions/v1/ev-calculate")
          echo "EV Calculate Status: $response"
          cat response.txt
