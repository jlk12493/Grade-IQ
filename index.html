<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#B6FF00">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>GradeIQ — Market Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/shared.js"></script>
<style>
/* ── HOME: MARKET INTELLIGENCE ───────────────────────────────────────────── */

/* Scanner Pulse strip */
.pulse-strip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--green);
  border-radius: var(--r);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 8px;
}
.pulse-strip-left { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: pdot 2s infinite; box-shadow: 0 0 6px var(--green); }
@keyframes pdot { 0%,100%{opacity:1;box-shadow:0 0 6px var(--green);} 50%{opacity:.3;box-shadow:none;} }
.pulse-label { font-size: 10px; font-weight: 700; color: var(--green); letter-spacing: 1px; text-transform: uppercase; }
.pulse-stat { font-size: 12px; color: var(--text-muted); }
.pulse-stat strong { color: var(--text); font-weight: 700; }
.pulse-divider { width: 1px; height: 14px; background: var(--border); }
.pulse-updated { font-size: 10px; color: var(--text-muted); font-style: italic; }

/* Section headers */
.sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.sec-title { font-size: 10px; font-weight: 700; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
.sec-title::before { content:''; display:inline-block; width:3px; height:14px; background:var(--green); border-radius:2px; }
.sec-link { font-size: 11px; color: var(--text-muted); cursor: pointer; transition: color .15s; text-decoration: none; }
.sec-link:hover { color: var(--green); }

/* ── MARKET INDEX ─────────────────────────────────────────────────────────── */
.index-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
@media(max-width:768px) { .index-grid { grid-template-columns: repeat(2, 1fr); } }
.index-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  position: relative;
  overflow: hidden;
  transition: border-color .15s;
}
.index-card:hover { border-color: rgba(182,255,0,.3); }
.index-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
.index-sport-info {}
.index-emoji { font-size: 22px; line-height: 1; margin-bottom: 4px; }
.index-sport-name { font-size: 13px; font-weight: 800; color: var(--text); }
.index-signal-count { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
/* Circular score gauge */
.index-gauge { position: relative; width: 60px; height: 60px; flex-shrink: 0; }
.index-gauge svg { transform: rotate(-90deg); }
.index-gauge-track { fill: none; stroke: var(--surface-2); stroke-width: 5; }
.index-gauge-fill { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset .8s ease; }
.index-gauge-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.index-gauge-score { font-size: 16px; font-weight: 900; line-height: 1; }
.index-gauge-sub { font-size: 7px; color: var(--text-muted); font-weight: 700; letter-spacing: .5px; }
/* EV distribution bar */
.index-dist { margin-bottom: 12px; }
.index-dist-lbl { font-size: 8px; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
.index-dist-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; gap: 1px; }
.idb-seg { height: 100%; border-radius: 2px; min-width: 2px; transition: flex .5s ease; }
.index-dist-legend { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
.idl-item { display: flex; align-items: center; gap: 3px; font-size: 9px; color: var(--text-muted); }
.idl-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
/* Bottom stats */
.index-bottom-stats { display: flex; gap: 0; border-top: 1px solid var(--border); padding-top: 10px; }
.index-bottom-stat { flex: 1; text-align: center; }
.index-bottom-stat + .index-bottom-stat { border-left: 1px solid var(--border); }
.ibs-lbl { font-size: 7px; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
.ibs-val { font-size: 13px; font-weight: 800; }

/* ── SPORT SPOTLIGHT ──────────────────────────────────────────────────────── */
.spotlight-section { margin-bottom: 28px; }
.sport-tabs { display: flex; gap: 2px; margin-bottom: 14px; flex-wrap: wrap; }
.stab {
  padding: 6px 16px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  transition: all .15s;
  letter-spacing: .5px;
}
.stab:hover { border-color: var(--green); color: var(--green); }
.stab.active { background: var(--green); color: #000; border-color: var(--green); }
.spotlight-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
@media(max-width:640px) { .spotlight-grid { grid-template-columns: 1fr; } }
.spot-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  cursor: pointer;
  transition: border-color .15s, transform .15s;
}
.spot-card:hover { border-color: rgba(182,255,0,.4); transform: translateY(-2px); }
.spot-img { height: 200px; overflow: hidden; background: var(--surface-2); position: relative; display: flex; align-items: center; justify-content: center; }
.spot-img img { height: 100%; width: auto; max-width: 100%; object-fit: contain; position: relative; z-index: 2; }
.spot-img-bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: blur(12px) brightness(.4) saturate(1.3); transform: scale(1.1); z-index: 1; }
.spot-img-empty { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
.spot-rank { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,.75); color: var(--green); font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 4px; backdrop-filter: blur(4px); letter-spacing: 1px; }
.spot-iq { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,.75); color: var(--green); font-size: 14px; font-weight: 900; padding: 2px 8px; border-radius: 4px; backdrop-filter: blur(4px); }
.spot-body { padding: 12px 14px; }
.spot-player { font-size: 14px; font-weight: 800; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.spot-set { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 8px; }
.spot-stats { display: flex; justify-content: space-between; align-items: flex-end; }
.spot-ev { font-size: 18px; font-weight: 900; color: var(--green); }
.spot-ev-lbl { font-size: 8px; color: var(--text-muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.spot-buy { text-align: right; }
.spot-buy-lbl { font-size: 8px; color: var(--text-muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.spot-buy-val { font-size: 13px; font-weight: 800; color: var(--text); }

/* ── BEST VALUE BY PRICE ──────────────────────────────────────────────────── */
.value-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
@media(max-width:768px) { .value-grid { grid-template-columns: 1fr; } }
.value-col { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.value-col-head {
  padding: 10px 14px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.value-col-title { font-size: 12px; font-weight: 800; color: var(--text); }
.value-col-sub { font-size: 10px; color: var(--text-muted); }
.value-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
}
.value-row:hover { background: rgba(182,255,0,.04); }
.value-row:last-child { border-bottom: none; }
.value-thumb { width: 36px; height: 50px; border-radius: 4px; overflow: hidden; background: var(--surface-2); border: 1px solid var(--border); flex-shrink: 0; }
.value-thumb img { width: 100%; height: 100%; object-fit: cover; }
.value-thumb-empty { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
.value-info { flex: 1; min-width: 0; }
.value-player { font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.value-set { font-size: 9px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.value-right { text-align: right; flex-shrink: 0; }
.value-ev { font-size: 13px; font-weight: 800; color: var(--green); }
.value-raw { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

/* Loading */
.shimmer { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); animation: shim 1.5s infinite; }
@keyframes shim { 0%,100%{opacity:.5;} 50%{opacity:.9;} }
.empty-state { text-align: center; padding: 30px 20px; color: var(--text-muted); font-size: 12px; }



</style>
</head>
<body>
<script>buildNav('home');</script>

<!-- PROMO TICKER - full width between nav and content -->


<div class="main">

  <!-- SCANNER PULSE STRIP -->
  <div class="pulse-strip" id="pulse-strip">
    <div class="pulse-strip-left">
      <div class="pulse-dot"></div>
      <div class="pulse-label">Scanner Live</div>
      <div class="pulse-divider"></div>
      <div class="pulse-stat" id="pulse-signals">-- active buy signals</div>
      <div class="pulse-divider"></div>
      <div class="pulse-stat" id="pulse-avg-ev">Avg EV: --</div>
      <div class="pulse-divider"></div>
      <div class="pulse-stat" id="pulse-avg-gem">Avg Gem Rate: --</div>
    </div>
    <div class="pulse-updated" id="pulse-updated">Checking scanner...</div>
  </div>

  <!-- GRADEIQ MARKET INDEX -->
  <div style="margin-bottom:28px;">
    <div class="sec-head">
      <div class="sec-title">GradeIQ Market Index</div>

</div>

<script>
var PLATFORM_FEE = 0.135;
var GRADING_TIERS = [];
var ALL_SIGNALS = [];
var SPOTLIGHT_CACHE = {};

var SPORT_CONFIG = {
  Basketball: { emoji: '🏀', color: '#fb923c', bg: 'rgba(249,115,22,.12)' },
  Baseball:   { emoji: '⚾', color: '#f87171', bg: 'rgba(239,68,68,.12)' },
  Football:   { emoji: '🏈', color: '#34d399', bg: 'rgba(16,185,129,.12)' },
  TCG:        { emoji: '🃏', color: '#c084fc', bg: 'rgba(168,85,247,.15)' },
};

// ── INIT ──────────────────────────────────────────────────────────────────
(async function init(){
  var user = await requireAuth();
  if (!user) return;
  await Promise.all([loadGradingTiers(), loadAllSignals()]);
  renderPulseStrip();
  renderMarketIndex();
  renderSpotlight('Basketball');
  renderValueByPrice();
  startSpotlightRotation();
})();

async function loadGradingTiers(){
  var res = await sb.from('grading_tiers').select('*').eq('active',true).order('cost_per_card',{ascending:true});
  var seen = {};
  GRADING_TIERS = (res.data||[]).filter(function(t){ if(seen[t.tier_name])return false; seen[t.tier_name]=true; return true; });
}

async function loadAllSignals(){
  var all = [], page = 0;
  while(true){
    var res = await sb.from('ev_scanner')
      .select('scp_id,player,parallel,year,set_name,card_no,sport,scc_score,ev_pct,ev_dollar,max_buy_40,raw_price,psa10_price,psa9_price,actual_gem_rate,sales_volume,image_url,scanned_at,decision')
      .eq('decision','BUY')
      .order('scc_score',{ascending:false,nullsFirst:false})
      .range(page*1000,(page+1)*1000-1);
    var chunk = res.data||[];
    all = all.concat(chunk);
    if(chunk.length<1000) break;
    page++;
  }
  ALL_SIGNALS = all;
}

// ── EV HELPERS ────────────────────────────────────────────────────────────
function getBestEV(r){
  if(!GRADING_TIERS.length||!r.psa10_price) return {evPct:r.ev_pct||0, maxBuy:r.max_buy_40||0};
  var bestAnn=-Infinity, result={evPct:r.ev_pct||0, maxBuy:r.max_buy_40||0};
  GRADING_TIERS.forEach(function(t){
    var n10=(r.psa10_price||0)*(1-PLATFORM_FEE);
    var n9=r.psa9_price?r.psa9_price*(1-PLATFORM_FEE):n10*0.30;
    var gem=r.actual_gem_rate||0;
    var exp=gem*n10+(1-gem)*0.80*n9;
    var total=(r.raw_price||0)+t.cost_per_card;
    var evP=total>0?(exp-total)/total:0;
    var days=(t.turnaround_business_days_avg||0)*1.4;
    var ann=days>0?Math.pow(1+evP,365/days)-1:-Infinity;
    if(exp-total>0&&evP>=0.40&&ann>bestAnn){bestAnn=ann;result={evPct:evP,maxBuy:Math.max(0,(exp/1.40)-t.cost_per_card)};}
  });
  return result;
}

function f$(v){ if(v==null||isNaN(v))return'--'; return(v<0?'-$':'$')+Math.abs(v).toFixed(2); }
function fPct(v,d){ if(v==null)return'--'; return(v*100).toFixed(d==null?0:d)+'%'; }
function stripSet(s){ return(s||'').replace(/^(Baseball|Football|Basketball|Hockey|Soccer|TCG) Cards /i,'').replace(/^\d{4}\s+/,'').trim(); }

// ── SCANNER PULSE STRIP ───────────────────────────────────────────────────
function renderPulseStrip(){
  var signals = g('pulse-signals');
  var avgEvEl = g('pulse-avg-ev');
  var avgGemEl = g('pulse-avg-gem');
  var updatedEl = g('pulse-updated');

  var total = ALL_SIGNALS.length;
  var avgEV = total ? ALL_SIGNALS.reduce(function(s,r){return s+(r.ev_pct||0);},0)/total : 0;
  var avgGem = total ? ALL_SIGNALS.reduce(function(s,r){return s+(r.actual_gem_rate||0);},0)/total : 0;

  if(signals) signals.innerHTML = '<strong>'+total+'</strong> active buy signals';
  if(avgEvEl) avgEvEl.innerHTML = 'Avg EV: <strong style="color:var(--green);">'+fPct(avgEV,0)+'</strong>';
  if(avgGemEl) avgGemEl.innerHTML = 'Avg Gem Rate: <strong>'+fPct(avgGem,1)+'</strong>';

  // Last scanned
  if(ALL_SIGNALS.length && updatedEl){
    var latest = ALL_SIGNALS.reduce(function(a,b){
      return new Date(b.scanned_at||0) > new Date(a.scanned_at||0) ? b : a;
    }, ALL_SIGNALS[0]);
    var mins = Math.floor((Date.now()-new Date(latest.scanned_at).getTime())/60000);
    var ago = mins < 1 ? 'Just now' : mins < 60 ? mins+'m ago' : Math.floor(mins/60)+'h ago';
    updatedEl.textContent = 'Updated ' + ago;
  }
}

// ── MARKET INDEX ──────────────────────────────────────────────────────────
function renderMarketIndex(){
  var el = g('market-index'); if(!el) return;
  var sports = ['Basketball','Baseball','Football','TCG'];

  var html = sports.map(function(sport){
    var cfg = SPORT_CONFIG[sport];
    var cards = ALL_SIGNALS.filter(function(r){ return r.sport===sport; });
    if(!cards.length){
      return '<div class="index-card"><div class="index-emoji">'+cfg.emoji+'</div>'
        +'<div class="index-sport-name">'+sport+'</div>'
        +'<div style="font-size:11px;color:var(--text-muted);margin-top:8px;">No data</div></div>';
    }

    var totalVol = cards.reduce(function(s,r){return s+(r.sales_volume||0);},0)||1;
    var weightedEV = cards.reduce(function(s,r){
      var w=(r.sales_volume||1)/totalVol; return s+(r.ev_pct||0)*w;
    },0);
    var avgGem = cards.reduce(function(s,r){return s+(r.actual_gem_rate||0);},0)/cards.length;
    var avgIQ  = cards.reduce(function(s,r){return s+(r.scc_score||0);},0)/cards.length;

    // Index score 0-100
    var indexScore = Math.min(100, Math.round(weightedEV*50));
    var scoreColor = indexScore>=60?'var(--green)':indexScore>=40?'#F59E0B':'#F87171';

    // Gauge SVG (circle, r=26, circumference=163.4)
    var circ = 163.4;
    var dash = circ * (indexScore/100);
    var gaugeSvg = '<svg width="60" height="60" viewBox="0 0 60 60">'
      +'<circle class="index-gauge-track" cx="30" cy="30" r="26"/>'
      +'<circle class="index-gauge-fill" cx="30" cy="30" r="26" stroke="'+scoreColor+'" '
        +'stroke-dasharray="'+dash+' '+circ+'" stroke-dashoffset="0"/>'
      +'</svg>';

    // EV distribution: <40% = red, 40-100% = amber, 100-200% = green, 200%+ = bright green
    var buckets = [{label:'<40%',color:'#F87171',count:0},{label:'40-100%',color:'#F59E0B',count:0},{label:'100-200%',color:'var(--green)',count:0},{label:'200%+',color:'#4ade80',count:0}];
    cards.forEach(function(r){
      var ev=(r.ev_pct||0)*100;
      if(ev<40) buckets[0].count++;
      else if(ev<100) buckets[1].count++;
      else if(ev<200) buckets[2].count++;
      else buckets[3].count++;
    });
    var totalCards = cards.length;
    var distBar = buckets.map(function(b){
      var pct = (b.count/totalCards)*100;
      return '<div class="idb-seg" style="flex:'+pct+';background:'+b.color+';opacity:.8;" title="'+b.label+': '+b.count+'"></div>';
    }).join('');
    var legend = buckets.filter(function(b){return b.count>0;}).map(function(b){
      return '<div class="idl-item"><div class="idl-dot" style="background:'+b.color+';"></div>'+b.label+' ('+b.count+')</div>';
    }).join('');

    return '<div class="index-card">'
      +'<div class="index-card-top">'
        +'<div class="index-sport-info">'
          +'<div class="index-emoji">'+cfg.emoji+'</div>'
          +'<div class="index-sport-name">'+sport+'</div>'
          +'<div class="index-signal-count">'+cards.length+' signals</div>'
        +'</div>'
        +'<div class="index-gauge">'
          +gaugeSvg
          +'<div class="index-gauge-label">'
            +'<div class="index-gauge-score" style="color:'+scoreColor+';">'+indexScore+'</div>'
            +'<div class="index-gauge-sub">INDEX</div>'
          +'</div>'
        +'</div>'
      +'</div>'
      +'<div class="index-dist">'
        +'<div class="index-dist-lbl">EV% Distribution</div>'
        +'<div class="index-dist-bar">'+distBar+'</div>'
        +'<div class="index-dist-legend">'+legend+'</div>'
      +'</div>'
      +'<div class="index-bottom-stats">'
        +'<div class="index-bottom-stat"><div class="ibs-lbl">Avg EV</div><div class="ibs-val" style="color:var(--green);">'+fPct(weightedEV,0)+'</div></div>'
        +'<div class="index-bottom-stat"><div class="ibs-lbl">Avg Gem</div><div class="ibs-val">'+fPct(avgGem,1)+'</div></div>'
        +'<div class="index-bottom-stat"><div class="ibs-lbl">Avg IQ</div><div class="ibs-val" style="color:var(--green);">'+Math.round(avgIQ)+'</div></div>'
      +'</div>'
      +'</div>';
  }).join('');

  el.innerHTML = html;
}

// ── SPORT SPOTLIGHT ───────────────────────────────────────────────────────
var SPOTLIGHT_SPORTS = ['Basketball','Baseball','Football','TCG'];
var SPOTLIGHT_IDX = 0;
var SPOTLIGHT_TIMER = null;

function startSpotlightRotation(){
  clearInterval(SPOTLIGHT_TIMER);
  SPOTLIGHT_TIMER = setInterval(function(){
    SPOTLIGHT_IDX = (SPOTLIGHT_IDX + 1) % SPOTLIGHT_SPORTS.length;
    var sport = SPOTLIGHT_SPORTS[SPOTLIGHT_IDX];
    var tabs = document.querySelectorAll('.stab');
    tabs.forEach(function(t){ t.classList.toggle('active', t.dataset.sport===sport); });
    renderSpotlight(sport);
  }, 10000);
}

function setSpotlight(sport, btn){
  // Reset timer on manual click
  clearInterval(SPOTLIGHT_TIMER);
  SPOTLIGHT_IDX = SPOTLIGHT_SPORTS.indexOf(sport);
  document.querySelectorAll('.stab').forEach(function(t){ t.classList.remove('active'); });
  btn.classList.add('active');
  renderSpotlight(sport);
  // Restart auto-rotation after 10s
  setTimeout(startSpotlightRotation, 10000);
}

function renderSpotlight(sport){
  var el = g('spotlight-grid'); if(!el) return;
  var top3 = ALL_SIGNALS.filter(function(r){ return r.sport===sport; }).slice(0,3);

  if(!top3.length){
    el.innerHTML='<div class="empty-state" style="grid-column:1/-1;">No '+sport+' signals available right now.</div>';
    return;
  }

  var ranks = ['#1','#2','#3'];
  el.innerHTML = top3.map(function(r, i){
    var ev = getBestEV(r);
    var ss = stripSet(r.set_name);
    var bgStyle = r.image_url ? ' style="background-image:url('+r.image_url+')"' : '';
    var imgHtml = r.image_url
      ? '<div class="spot-img-bg"'+bgStyle+'></div><img src="'+r.image_url+'" loading="lazy" onerror="this.style.display=\'none\'">'
      : '<div class="spot-img-empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="1.5"><rect x="2" y="3" width="20" height="18" rx="2"/><circle cx="12" cy="10" r="3"/><path d="M6 21c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg></div>';
    return '<div class="spot-card" onclick="window.location.href=\'card.html?id='+r.scp_id+'\'">'
      +'<div class="spot-img">'
        +imgHtml
        +'<div class="spot-rank">'+ranks[i]+'</div>'
        +'<div class="spot-iq">'+Math.round(r.scc_score||0)+'</div>'
      +'</div>'
      +'<div class="spot-body">'
        +'<div class="spot-player">'+(r.player||'--')+'</div>'
        +'<div class="spot-set">'+(r.year?r.year+' ':'')+ss+(r.card_no?' · #'+r.card_no:'')+'</div>'
        +'<div class="spot-stats">'
          +'<div><div class="spot-ev-lbl">EV%</div><div class="spot-ev">'+fPct(ev.evPct,0)+'</div></div>'
          +'<div class="spot-buy"><div class="spot-buy-lbl">Buy ≤</div><div class="spot-buy-val">'+f$(ev.maxBuy)+'</div></div>'
        +'</div>'
      +'</div>'
      +'</div>';
  }).join('');
}

// ── BEST VALUE BY PRICE RANGE ─────────────────────────────────────────────
function renderValueByPrice(){
  var el = g('value-grid'); if(!el) return;

  var ranges = [
    { label: 'Under $20', sub: 'raw price ≤ $20', max: 20 },
    { label: 'Under $50', sub: 'raw price ≤ $50', max: 50 },
    { label: 'Under $100', sub: 'raw price ≤ $100', max: 100 },
  ];

  el.innerHTML = ranges.map(function(range){
    var cards = ALL_SIGNALS
      .filter(function(r){ return (r.raw_price||0) <= range.max; })
      .slice(0,5);

    var rows = cards.length ? cards.map(function(r){
      var ev = getBestEV(r);
      var ss = stripSet(r.set_name);
      var thumb = r.image_url
        ? '<img src="'+r.image_url+'" loading="lazy" onerror="this.style.display=\'none\'">'
        : '<div class="value-thumb-empty"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="1.5"><rect x="2" y="3" width="20" height="18" rx="2"/></svg></div>';
      return '<div class="value-row" onclick="window.location.href=\'card.html?id='+r.scp_id+'\'">'
        +'<div class="value-thumb">'+thumb+'</div>'
        +'<div class="value-info">'
          +'<div class="value-player">'+(r.player||'--')+'</div>'
          +'<div class="value-set">'+(r.year?r.year+' ':'')+ss+'</div>'
        +'</div>'
        +'<div class="value-right">'
          +'<div class="value-ev">'+fPct(ev.evPct,0)+'</div>'
          +'<div class="value-raw">'+f$(r.raw_price)+' raw</div>'
        +'</div>'
        +'</div>';
    }).join('') : '<div class="empty-state">No signals in this range</div>';

    return '<div class="value-col">'
      +'<div class="value-col-head">'
        +'<div class="value-col-title">'+range.label+'</div>'
        +'<div class="value-col-sub">'+range.sub+'</div>'
      +'</div>'
      +rows
      +'</div>';
  }).join('');
}
</script>
</body>
</html>
