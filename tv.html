<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis — Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@200;300;400;500;600&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#080808;--bg1:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;--bg4:#262626;
--border:#1e1e1e;--border2:#2a2a2a;
--text:#f0f0f0;--text2:#888;--text3:#444;
--green:#00e676;--green-dim:rgba(0,230,118,0.08);
--red:#ff5252;--red-dim:rgba(255,82,82,0.08);
--amber:#ffab40;--amber-dim:rgba(255,171,64,0.08);
--blue:#448aff;--blue-dim:rgba(68,138,255,0.08);
--purple:#e040fb;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Geist',system-ui,sans-serif;color:var(--text);display:flex;flex-direction:column}

/* ── Header bar ── */
.hdr{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;flex-shrink:0;background:var(--bg1);gap:24px}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-logo{width:24px;height:24px;background:var(--text);border-radius:5px;display:flex;align-items:center;justify-content:center}
.hdr-logo svg{width:12px;height:12px}
.hdr-name{font-size:13px;font-weight:600;letter-spacing:0.02em;color:var(--text)}
.hdr-sep{width:1px;height:18px;background:var(--border2)}
.hdr-time{font-family:'Geist Mono',monospace;font-size:13px;color:var(--text2);letter-spacing:0.05em}
.hdr-date{font-size:12px;color:var(--text3);letter-spacing:0.03em}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.hdr-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 2px rgba(0,230,118,0.2)}50%{box-shadow:0 0 0 4px rgba(0,230,118,0.1)}}
.refresh-badge{font-family:'Geist Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:0.1em}

/* ── Grid ── */
.grid{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:1px;background:var(--border);overflow:hidden}
.cell{background:var(--bg1);padding:28px 32px;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ── Cell labels ── */
.cell-label{font-family:'Geist Mono',monospace;font-size:9px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.cell-label::after{content:'';flex:1;height:1px;background:var(--border2)}

/* ── Big number ── */
.big-num{font-family:'Geist Mono',monospace;font-size:64px;font-weight:500;line-height:1;letter-spacing:-0.03em;color:var(--text)}
.big-num.green{color:var(--green)}
.big-num.amber{color:var(--amber)}
.big-num.red{color:var(--red)}
.big-sub{font-size:13px;color:var(--text3);margin-top:8px;font-weight:300}

/* ── Metric grid ── */
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;flex:1}
.metric-box{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:16px 18px;display:flex;flex-direction:column;justify-content:space-between}
.metric-box-val{font-family:'Geist Mono',monospace;font-size:28px;font-weight:500;letter-spacing:-0.02em;color:var(--text);line-height:1}
.metric-box-val.green{color:var(--green)}
.metric-box-val.amber{color:var(--amber)}
.metric-box-val.red{color:var(--red)}
.metric-box-val.blue{color:var(--blue)}
.metric-box-label{font-size:11px;color:var(--text3);font-weight:300;margin-top:6px;letter-spacing:0.02em}

/* ── Trial list ── */
.trial-list{flex:1;display:flex;flex-direction:column;gap:0;overflow:hidden}
.trial-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.trial-row:last-child{border:none}
.trial-email{font-family:'Geist Mono',monospace;font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
.trial-info{display:flex;align-items:center;gap:10px;flex-shrink:0}
.trial-day{font-size:11px;color:var(--text3);font-family:'Geist Mono',monospace}
.badge{font-family:'Geist Mono',monospace;font-size:10px;font-weight:500;padding:3px 8px;border-radius:4px}
.badge-red{background:var(--red-dim);color:var(--red)}
.badge-amber{background:var(--amber-dim);color:var(--amber)}
.badge-green{background:var(--green-dim);color:var(--green)}

/* ── Chart ── */
.chart-wrap{flex:1;position:relative;min-height:0}
canvas{width:100%!important;height:100%!important}

/* ── Calendar ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;flex:1}
.cal-day-name{font-size:9px;font-family:'Geist Mono',monospace;color:var(--text3);text-align:center;padding-bottom:6px;letter-spacing:0.1em;text-transform:uppercase}
.cal-cell{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Geist Mono',monospace;font-size:11px;color:var(--text3);background:var(--bg2);cursor:default;position:relative;flex-direction:column;gap:2px}
.cal-cell.today{border:1px solid var(--blue);color:var(--blue)}
.cal-cell.has-post{background:var(--green-dim);color:var(--green)}
.cal-cell.empty{background:transparent}
.cal-cell-dot{width:4px;height:4px;border-radius:50%;background:var(--green)}

/* ── Ticker ── */
.ticker{height:36px;border-top:1px solid var(--border);background:var(--bg);display:flex;align-items:center;overflow:hidden;flex-shrink:0}
.ticker-inner{display:flex;gap:48px;white-space:nowrap;animation:ticker 40s linear infinite}
.ticker-item{font-family:'Geist Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:0.05em;display:flex;align-items:center;gap:8px}
.ticker-item .val{color:var(--text2)}
.ticker-item .up{color:var(--green)}
.ticker-item .down{color:var(--red)}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ── Cell spanning ── */
.cell-wide{grid-column:span 2}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">
      <svg viewBox="0 0 14 14" fill="none"><path d="M7 1L13 4V10L7 13L1 10V4L7 1Z" stroke="black" stroke-width="1.2" fill="none"/><circle cx="7" cy="7" r="2" fill="black"/></svg>
    </div>
    <span class="hdr-name">Jarvis</span>
  </div>
  <div class="hdr-sep"></div>
  <div class="hdr-time" id="clock">—</div>
  <div class="hdr-date" id="dateDisp">—</div>
  <div class="hdr-right">
    <div class="refresh-badge" id="refreshBadge">Refreshing...</div>
    <div class="hdr-status"><div class="dot"></div>GradeIQ Live</div>
  </div>
</div>

<div class="grid">

  <!-- Cell 1: MRR -->
  <div class="cell">
    <div class="cell-label">Monthly Recurring Revenue</div>
    <div class="big-num green" id="mrr">—</div>
    <div class="big-sub" id="mrrSub">Loading...</div>
  </div>

  <!-- Cell 2: Key metrics 2x2 -->
  <div class="cell">
    <div class="cell-label">Overview</div>
    <div class="metric-grid">
      <div class="metric-box">
        <div class="metric-box-val" id="mPaying">—</div>
        <div class="metric-box-label">Paying members</div>
      </div>
      <div class="metric-box">
        <div class="metric-box-val amber" id="mTrials">—</div>
        <div class="metric-box-label">Active trials</div>
      </div>
      <div class="metric-box">
        <div class="metric-box-val red" id="mExpiring">—</div>
        <div class="metric-box-label">Expiring this week</div>
      </div>
      <div class="metric-box">
        <div class="metric-box-val blue" id="mDiscord">—</div>
        <div class="metric-box-label">Discord connected</div>
      </div>
    </div>
  </div>

  <!-- Cell 3: MRR chart -->
  <div class="cell">
    <div class="cell-label">MRR Growth</div>
    <div class="chart-wrap" id="chartWrap">
      <canvas id="mrrChart"></canvas>
    </div>
  </div>

  <!-- Cell 4: Expiring trials list -->
  <div class="cell cell-wide">
    <div class="cell-label">Trials Expiring This Week</div>
    <div class="trial-list" id="trialList">
      <div style="font-size:12px;color:var(--text3)">Loading...</div>
    </div>
  </div>

  <!-- Cell 5: Content calendar -->
  <div class="cell">
    <div class="cell-label">Content Calendar — <span id="calMonth"></span></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

</div>

<div class="ticker">
  <div class="ticker-inner" id="ticker"></div>
</div>

<script>
const SB_URL='https://lmwqizcflhikvtoqehzj.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxtd3FpemNmbGhpa3Z0b3FlaHpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDQ5NDMsImV4cCI6MjA4OTk4MDk0M30.95XMeRWGeCcD_KxN40ciJi_QjB9GG4sVJexzBEhJ9NM';
const PRICE=19.99;
let chartInst=null;

async function dbq(t,p=''){
  const r=await fetch(`${SB_URL}/rest/v1/${t}?${p}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}});
  return r.json();
}

// ── Clock ──
function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
  document.getElementById('dateDisp').textContent=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
setInterval(updateClock,1000);
updateClock();

// ── Load data ──
async function loadData(){
  document.getElementById('refreshBadge').textContent='Refreshing...';
  try{
    const m=await dbq('whop_members','select=*');
    const now=new Date();
    const active=m.filter(x=>x.status==='active');
    const paying=active.filter(x=>(now-new Date(x.joined_at))/86400000>30);
    const trials=active.filter(x=>(now-new Date(x.joined_at))/86400000<=30);
    const exp=trials.map(x=>{
      const d=Math.floor((now-new Date(x.joined_at))/86400000);
      return{...x,daysSince:d,daysLeft:30-d};
    }).filter(x=>x.daysLeft<=7&&x.daysLeft>=0).sort((a,b)=>a.daysLeft-b.daysLeft);
    const mrr=paying.length*PRICE;
    const discOn=active.filter(x=>x.discord_id).length;

    // MRR
    document.getElementById('mrr').textContent=`$${mrr.toFixed(2)}`;
    document.getElementById('mrrSub').textContent=`${paying.length} paying × $${PRICE} · ${trials.length} trials in pipeline`;

    // Metrics
    document.getElementById('mPaying').textContent=paying.length;
    document.getElementById('mTrials').textContent=trials.length;
    document.getElementById('mExpiring').textContent=exp.length;
    document.getElementById('mDiscord').textContent=`${discOn}/${active.length}`;

    // Trials list
    renderTrials(exp);

    // Chart
    renderChart(m, paying.length, mrr);

    document.getElementById('refreshBadge').textContent=`Updated ${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}`;
  }catch(e){
    console.error(e);
    document.getElementById('refreshBadge').textContent='Error — retrying...';
  }
}

function renderTrials(exp){
  const el=document.getElementById('trialList');
  if(!exp.length){
    el.innerHTML=`<div style="font-size:13px;color:var(--text3);padding:20px 0">No trials expiring this week</div>`;
    return;
  }
  el.innerHTML=exp.slice(0,8).map(x=>{
    const name=x.email||'unknown';
    const cls=x.daysLeft<=2?'badge-red':x.daysLeft<=4?'badge-amber':'badge-green';
    const dayLabel=x.daysLeft===0?'Today':x.daysLeft===1?'Tomorrow':`${x.daysLeft} days`;
    return`<div class="trial-row">
      <span class="trial-email">${name}</span>
      <div class="trial-info">
        <span class="trial-day">Day ${x.daysSince} of 30</span>
        <span class="badge ${cls}">${dayLabel}</span>
      </div>
    </div>`;
  }).join('');
}

function renderChart(members, currentPaying, currentMrr){
  const now=new Date();
  const labels=[];
  const data=[];

  // Build 8-week estimated MRR history based on join dates
  for(let w=7;w>=0;w--){
    const weekStart=new Date(now);
    weekStart.setDate(weekStart.getDate()-(w*7));
    const weekLabel=weekStart.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    labels.push(weekLabel);

    // Count members who were paying at that point
    const payingThen=members.filter(m=>{
      if(m.status!=='active'&&m.status!=='inactive')return false;
      const joined=new Date(m.joined_at);
      const daysSinceJoin=(weekStart-joined)/86400000;
      return daysSinceJoin>30;
    }).length;
    data.push(+(payingThen*PRICE).toFixed(2));
  }
  data[data.length-1]=+currentMrr.toFixed(2);

  const ctx=document.getElementById('mrrChart').getContext('2d');
  if(chartInst)chartInst.destroy();

  chartInst=new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[{
        data,
        borderColor:'#00e676',
        backgroundColor:'rgba(0,230,118,0.05)',
        borderWidth:2,
        pointRadius:3,
        pointBackgroundColor:'#00e676',
        fill:true,
        tension:0.4,
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{
        backgroundColor:'#1e1e1e',
        borderColor:'#2a2a2a',
        borderWidth:1,
        titleColor:'#888',
        bodyColor:'#f0f0f0',
        callbacks:{label:ctx=>`$${ctx.raw}`}
      }},
      scales:{
        x:{grid:{color:'#1a1a1a'},ticks:{color:'#444',font:{family:'Geist Mono',size:10}}},
        y:{grid:{color:'#1a1a1a'},ticks:{color:'#444',font:{family:'Geist Mono',size:10},callback:v=>`$${v}`},beginAtZero:true}
      }
    }
  });
}

// ── Calendar ──
function renderCalendar(){
  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth();
  document.getElementById('calMonth').textContent=now.toLocaleDateString('en-US',{month:'long',year:'numeric'});

  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const days=['Su','Mo','Tu','We','Th','Fr','Sa'];

  // Simple posting schedule — M/W/F
  const postDays=[1,3,5];

  let html=days.map(d=>`<div class="cal-day-name">${d}</div>`).join('');

  // Empty cells before first day
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-cell empty"></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(year,month,d);
    const dow=date.getDay();
    const isToday=d===now.getDate();
    const hasPost=postDays.includes(dow)&&d>=now.getDate();
    const isPast=d<now.getDate();
    let cls='cal-cell';
    if(isToday)cls+=' today';
    else if(hasPost&&!isPast)cls+=' has-post';
    else if(isPast)cls+='';
    html+=`<div class="${cls}">${d}${hasPost&&!isPast&&!isToday?'<div class="cal-cell-dot"></div>':''}</div>`;
  }

  document.getElementById('calGrid').innerHTML=html;
}

// ── Ticker ──
function renderTicker(data){
  if(!data)return;
  const items=[
    {label:'MRR',val:`$${(data.paying*PRICE).toFixed(2)}`,cls:'up'},
    {label:'PAYING',val:data.paying,cls:''},
    {label:'TRIALS',val:data.trials,cls:''},
    {label:'EXPIRING',val:data.exp,cls:data.exp>5?'down':''},
    {label:'DISCORD',val:`${data.discOn}/${data.active}`,cls:''},
    {label:'CONV RATE',val:`${data.trials>0?Math.round(data.paying/(data.paying+data.trials)*100):0}%`,cls:'up'},
    {label:'TARGET MRR',val:'$10,000',cls:''},
    {label:'PROGRESS',val:`${Math.round((data.paying*PRICE)/10000*100)}%`,cls:'up'},
  ];

  const html=items.map(i=>`<div class="ticker-item">${i.label} <span class="val ${i.cls}">${i.val}</span></div>`).join('');
  document.getElementById('ticker').innerHTML=html+html; // duplicate for seamless loop
}

// ── Boot ──
async function boot(){
  renderCalendar();

  // Load Chart.js
  const script=document.createElement('script');
  script.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js';
  script.onload=async()=>{
    await loadData();
    // Also fetch ticker data
    try{
      const m=await dbq('whop_members','select=*');
      const now=new Date();
      const active=m.filter(x=>x.status==='active');
      const paying=active.filter(x=>(now-new Date(x.joined_at))/86400000>30);
      const trials=active.filter(x=>(now-new Date(x.joined_at))/86400000<=30);
      const exp=trials.filter(x=>{const d=Math.floor((now-new Date(x.joined_at))/86400000);return 30-d<=7;});
      renderTicker({paying:paying.length,trials:trials.length,exp:exp.length,discOn:active.filter(x=>x.discord_id).length,active:active.length});
    }catch(e){}
  };
  document.head.appendChild(script);

  // Refresh every 5 minutes
  setInterval(()=>{loadData();renderCalendar();},5*60*1000);
}

boot();
</script>
</body>
</html>
